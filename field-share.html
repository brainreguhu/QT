<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料下載</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: rgba(255, 255, 255, 0.1);
      --text: #e7ecf3;
      --subtle: #94a3b8;
      --primary: #2563eb;
      --secondary: #475569;
      --border: #475569;
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: radial-gradient(ellipse 120% 100% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--text);
    }
    .container {
      max-width: 560px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      word-break: break-all;
    }
    .meta {
      font-size: 0.9rem;
      color: var(--subtle);
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .hint {
      font-size: 0.92rem;
      color: var(--subtle);
      margin: 0 0 14px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button.primary {
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      padding: 10px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    a.back,
    button.back {
      color: #93c5fd;
      font-size: 0.95rem;
    }

    button.back {
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      cursor: pointer;
      text-decoration: underline;
    }
    .msg {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .msg.error { color: #fca5a5; }
  </style>
</head>
<body>
  <script>
    (function () {
      try {
        var q = new URLSearchParams(location.search);
        var id = q.get("id");
        if (id) {
          location.replace(new URL("field.html?share=" + encodeURIComponent(id), location.href).href);
        }
      } catch (e) {}
    })();
  </script>
  <div class="container">
    <div class="card">
      <h1 id="pageTitle">資料下載</h1>
      <p id="meta" class="meta" hidden></p>
      <p id="hint" class="hint"></p>
      <p id="msg" class="msg" role="status"></p>
      <div class="actions">
        <button id="downloadBtn" class="primary" type="button" disabled>下載</button>
        <a id="loginLink" class="back" href="login.html">登入</a>
        <button type="button" class="back" id="closePageBtn">關閉</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";
    const PROFILE_TABLE = "profiles";
    const FIELD_UPLOADS_TABLE = "field_uploads";
    const FIELD_FILES_BUCKET = "field-files";

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const pageTitleEl = document.getElementById("pageTitle");
    const metaEl = document.getElementById("meta");
    const hintEl = document.getElementById("hint");
    const msgEl = document.getElementById("msg");
    const downloadBtn = document.getElementById("downloadBtn");
    const loginLink = document.getElementById("loginLink");
    const closePageBtn = document.getElementById("closePageBtn");

    if (closePageBtn) {
      closePageBtn.addEventListener("click", () => {
        window.close();
      });
    }

    const params = new URLSearchParams(window.location.search);
    const recordId = params.get("id");

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function formatDateTime(value) {
      if (!value) return "";
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(date);
    }

    function normalizeRecord(row) {
      return {
        id: row.id,
        fileName: row.file_name || "",
        fileSize: Number(row.file_size || 0),
        filePath: row.file_path || "",
        zone: row.zone || "",
        username: row.username || "",
        orgType: row.org_type || "",
        approved: row.approved !== false,
        locked: !!row.locked,
        createdAt: row.created_at || ""
      };
    }

    function isDownloadBlocked(record) {
      return !record?.approved;
    }

    function canManageRestrictedActions(level, profileOk) {
      return Number(level) === 0 && profileOk === true;
    }

    function canDownloadHere(record, isAdmin) {
      if (!record?.filePath) return { ok: false, reason: "此筆資料缺少檔案路徑，無法下載。" };
      if (isDownloadBlocked(record)) return { ok: false, reason: "此筆資料待批准中，暫時無法下載。" };
      if (record.locked && !isAdmin) return { ok: false, reason: "此資料已下架，無法下載。" };
      return { ok: true, reason: "" };
    }

    function setLoginHref() {
      if (!recordId) return;
      loginLink.href = `login.html?next=field-share.html&id=${encodeURIComponent(recordId)}`;
    }

    async function runDownload(record) {
      const { data, error } = await sb.storage
        .from(FIELD_FILES_BUCKET)
        .createSignedUrl(record.filePath, 60);

      if (error || !data?.signedUrl) {
        throw error || new Error("無法取得下載連結");
      }

      const response = await fetch(data.signedUrl);
      if (!response.ok) {
        throw new Error("下載檔案失敗，請稍後再試。");
      }
      const fileBlob = await response.blob();
      const blobUrl = URL.createObjectURL(fileBlob);
      const downloadName = String(record.fileName || "").trim() || "download";

      const anchor = document.createElement("a");
      anchor.href = blobUrl;
      anchor.download = downloadName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(blobUrl);
    }

    async function main() {
      setLoginHref();

      if (!recordId) {
        msgEl.textContent = "連結缺少資料編號，無法開啟。";
        msgEl.classList.add("error");
        hintEl.textContent = "";
        downloadBtn.disabled = true;
        return;
      }

      const { data: authData, error: authErr } = await sb.auth.getUser();
      const user = !authErr && authData?.user ? authData.user : null;

      if (!user) {
        document.title = "請登入 — 資料下載";
        pageTitleEl.textContent = "請先登入";
        hintEl.textContent =
          "此連結僅供已登入使用者下載；請登入後再按「下載」。分享此連結不會直接暴露檔案網址。";
        msgEl.textContent = "";
        loginLink.style.display = "inline";
        downloadBtn.disabled = true;
        return;
      }

      loginLink.style.display = "none";

      const { data: profile, error: profileErr } = await sb
        .from(PROFILE_TABLE)
        .select("username, permission_level, approved")
        .eq("id", user.id)
        .maybeSingle();

      if (profileErr) {
        msgEl.textContent = `讀取權限失敗：${profileErr.message}`;
        msgEl.classList.add("error");
        downloadBtn.disabled = true;
        return;
      }

      if (!profile || profile.approved === false) {
        msgEl.textContent = "您的帳號尚未批准，無法下載。";
        msgEl.classList.add("error");
        downloadBtn.disabled = true;
        return;
      }

      const isAdmin = canManageRestrictedActions(profile.permission_level, true);

      const { data: row, error: rowErr } = await sb
        .from(FIELD_UPLOADS_TABLE)
        .select("id, file_name, file_size, file_path, zone, org_type, approved, locked, username, created_at")
        .eq("id", recordId)
        .maybeSingle();

      if (rowErr) {
        msgEl.textContent = `讀取資料失敗：${rowErr.message}`;
        msgEl.classList.add("error");
        downloadBtn.disabled = true;
        return;
      }

      if (!row) {
        msgEl.textContent = "找不到此筆資料，或您無權瀏覽。";
        msgEl.classList.add("error");
        downloadBtn.disabled = true;
        return;
      }

      const record = normalizeRecord(row);

      if (!isAdmin && (!record.approved || record.locked)) {
        msgEl.textContent = record.locked
          ? "此資料已下架或尚未公開，無法下載。"
          : "此筆資料待批准中，無法下載。";
        msgEl.classList.add("error");
        pageTitleEl.textContent = "無法下載";
        document.title = "無法下載";
        downloadBtn.disabled = true;
        return;
      }

      const name = record.fileName || "未命名檔案";
      document.title = name;
      pageTitleEl.textContent = name;
      metaEl.hidden = false;
      metaEl.textContent = [
        `大小：${formatSize(record.fileSize)}`,
        record.zone ? `工區：${record.zone}` : "",
        record.orgType ? `分類：${record.orgType}` : "",
        `上傳者：${record.username || "未知"}`,
        record.createdAt ? `上傳時間：${formatDateTime(record.createdAt)}` : ""
      ].filter(Boolean).join(" ｜ ");

      const dl = canDownloadHere(record, isAdmin);
      hintEl.textContent = dl.ok
        ? "檔案將下載到您的裝置；連結本身不含可直接存取檔案的網址。"
        : "";

      if (!dl.ok) {
        msgEl.textContent = dl.reason;
        msgEl.classList.toggle("error", true);
        downloadBtn.disabled = true;
        return;
      }

      msgEl.textContent = "";
      msgEl.classList.remove("error");
      downloadBtn.disabled = false;

      downloadBtn.onclick = async () => {
        downloadBtn.disabled = true;
        try {
          await runDownload(record);
        } catch (e) {
          console.error(e);
          msgEl.textContent = e?.message || "下載失敗。";
          msgEl.classList.add("error");
        } finally {
          downloadBtn.disabled = false;
        }
      };
    }

    main();
  </script>
</body>
</html>
