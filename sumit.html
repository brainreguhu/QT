<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>勾選統計</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --danger: #f87171;
      --ok: #4ade80;
      --btn-secondary-bg: #2a3038;
      --btn-secondary-hover: #383e4a;
      --row-divider: rgba(135, 158, 200, 0.42);
      --item-col: 192px;
      --floor-col: 42px;
      --action-col: 132px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 16px;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: min(96vw, 1600px);
      margin: 0 auto;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 7px;
    }
    .card-sticky-top {
      position: sticky;
      top: 10px;
      z-index: 30;
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.48);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .toolbar h1 {
      margin: 0;
      flex: 0 0 auto;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .cloud-load-status {
      margin-left: 10px;
      color: var(--ok);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.45s ease;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-left: auto;
    }
    .btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--btn-secondary-bg);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn:hover {
      background: var(--btn-secondary-hover);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary {
      background: rgba(61, 139, 253, 0.18);
      border-color: rgba(90, 160, 255, 0.55);
    }
    .btn.primary:hover {
      background: rgba(61, 139, 253, 0.3);
      border-color: rgba(90, 160, 255, 0.8);
    }
    .btn.danger {
      background: rgba(248, 113, 113, 0.14);
      border-color: rgba(248, 113, 113, 0.4);
      color: rgba(255, 210, 210, 0.98);
    }
    .btn.danger:hover {
      background: rgba(248, 113, 113, 0.22);
      border-color: rgba(248, 113, 113, 0.72);
      color: #fff;
    }
    .hint {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.14);
      margin-bottom: 14px;
    }
    .summary b {
      color: #fff;
      font-weight: 800;
    }
    .muted { color: var(--muted); }

    .grid-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.08);
    }
    .grid-head {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(20, 30, 46, 0.92);
      border-bottom: 1px solid rgba(120, 145, 185, 0.6);
      overflow: auto;
    }
    .grid-body {
      overflow: auto;
    }
    .grid-row {
      display: grid;
      grid-template-columns: var(--item-col) repeat(var(--floor-count), var(--floor-col)) var(--action-col);
      gap: 0;
      min-width: calc(var(--item-col) + (var(--floor-col) * var(--floor-count)) + var(--action-col));
    }
    .grid-cell {
      border-right: 1px solid rgba(70, 92, 128, 0.35);
      padding: 8px 10px;
      display: flex;
      align-items: center;
      min-height: 42px;
    }
    .grid-row > .grid-cell:last-child {
      border-right: none;
    }
    .grid-head .grid-cell {
      padding: 10px 10px;
      font-weight: 800;
      color: rgba(210, 223, 242, 0.92);
      justify-content: center;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    .grid-head .grid-cell:first-child,
    .grid-head .grid-cell:last-child {
      justify-content: flex-start;
      text-align: left;
      font-size: 14px;
    }
    .head-add-big-btn {
      width: fit-content;
      min-width: 0;
      padding: 4px 6px;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .section {
      margin-top: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section .card {
      padding: 7px;
    }
    .big-card {
      border: 0;
      border-radius: 0;
      background: transparent;
      overflow: hidden;
    }
    .big-card-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      align-items: center;
      justify-content: flex-start;
      padding: 5px 5px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(145, 168, 210, 0.38);
    }
    .big-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      flex: 0 1 50%;
      max-width: 50%;
    }
    .big-title input {
      width: 100%;
      min-width: 200px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 800;
      outline: none;
    }
    .big-title input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    .big-meta {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-left: 20px;
      color: rgba(196, 210, 230, 0.88);
      font-size: 13px;
      font-weight: 700;
      white-space: normal;
      justify-content: flex-start;
      text-align: left;
    }
    .big-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-left: auto;
    }
    .collapse-toggle-btn {
      padding: 4px 8px;
      font-size: 12px;
      min-width: 38px;
      text-align: center;
      background: rgba(250, 220, 120, 0.25);
      border-color: rgba(250, 220, 120, 0.7);
      color: #ffe9a6;
    }
    .collapse-toggle-btn:hover {
      background: rgba(250, 220, 120, 0.38);
      border-color: rgba(250, 220, 120, 0.95);
      color: #fff5cc;
    }
    .big-actions .btn {
      padding: 4px 7px;
      font-size: 12px;
    }
    .big-body {
      padding: 0;
    }

    .small-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .small-row {
      border: 1px solid rgba(90, 110, 150, 0.35);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.1);
    }
    .small-row + .small-row {
      border-top-color: rgba(90, 110, 150, 0.45);
    }
    .small-grid {
      overflow: hidden;
      border-top: 1px solid rgba(90, 110, 150, 0.24);
    }
    .small-grid .grid-row {
      grid-template-columns: var(--item-col) repeat(var(--floor-count), var(--floor-col)) var(--action-col);
      min-width: calc(var(--item-col) + (var(--floor-col) * var(--floor-count)) + var(--action-col));
      border-bottom: 1px solid rgba(90, 110, 150, 0.22);
      background: transparent;
    }
    .small-grid .grid-row:hover .grid-cell {
      background: rgba(61, 139, 253, 0.05);
    }
    .small-grid .grid-cell {
      padding: 4px 6px;
      justify-content: center;
    }
    .small-grid .grid-cell:first-child {
      justify-content: flex-start;
    }
    .small-grid .grid-cell:last-child {
      justify-content: center;
      font-weight: 900;
      color: rgba(230, 236, 246, 0.95);
    }
    .small-grid-end {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      width: 100%;
    }
    .small-grid-end .btn {
      padding: 4px 8px;
      font-size: 12px;
    }
    .small-grid-end .btn.mode {
      background: rgba(61, 139, 253, 0.16);
      border-color: rgba(90, 160, 255, 0.45);
    }
    .small-grid-end .btn.mode:hover {
      background: rgba(61, 139, 253, 0.28);
      border-color: rgba(90, 160, 255, 0.72);
    }
    .check {
      width: 18px;
      height: 18px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: #7b8493;
      border: 1px solid #636d7d;
      border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      cursor: pointer;
      position: relative;
    }
    .check:checked {
      background: #8cbcff;
      border-color: #71aaff;
    }
    .check:checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 4px;
      height: 9px;
      border: solid #1f4f96;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .floor-na {
      color: rgba(139, 156, 179, 0.8);
      font-weight: 700;
      user-select: none;
    }
    .small-grid-name-input {
      width: 100%;
      min-width: 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      padding: 5px 8px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      outline: none;
    }
    .small-grid-name-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }

    .footer-totals {
      margin-top: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
    }
    /* 歷程：時間由新到舊，每筆一張小卡；總完成 + 各項目表格，利於比對 */
    .history-snapshots {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.12);
      padding: 10px 12px;
      min-height: 48px;
    }
    .history-snapshot + .history-snapshot {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(90, 110, 150, 0.35);
    }
    .history-snapshot:first-child {
      padding-top: 0;
    }
    .history-date {
      font-size: 13px;
      font-weight: 800;
      color: rgba(210, 223, 242, 0.95);
      margin-bottom: 4px;
    }
    .history-overall {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .history-overall strong {
      color: var(--ok);
      font-weight: 800;
    }
    /* 原 35% 再縮 50% → 17.5%；窄螢幕仍撐滿可讀 */
    .history-item-table-wrap {
      width: 17.5%;
      max-width: 100%;
    }
    @media (max-width: 720px) {
      .history-item-table-wrap {
        width: 100%;
      }
    }
    .history-item-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
    }
    .history-item-table th,
    .history-item-table td {
      border: 1px solid rgba(70, 92, 128, 0.45);
      padding: 4px 6px;
      text-align: left;
      vertical-align: middle;
    }
    .history-item-table th {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-weight: 700;
    }
    /* 三欄寬度均分 */
    .history-item-table th:nth-child(1),
    .history-item-table td:nth-child(1) {
      width: calc(100% / 3);
      word-break: break-word;
      text-align: left;
    }
    .history-item-table th:nth-child(2),
    .history-item-table td:nth-child(2) {
      width: calc(100% / 3);
      text-align: center;
      font-weight: 700;
      white-space: nowrap;
    }
    .history-item-table th:nth-child(3),
    .history-item-table td:nth-child(3) {
      width: calc(100% / 3);
      text-align: right;
      font-weight: 800;
      color: rgba(230, 236, 246, 0.95);
      white-space: nowrap;
    }
    .history-empty {
      font-size: 14px;
      color: var(--muted);
      padding: 6px 0;
    }
    .footer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .footer-totals h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
  </style>
</head>
<body>
  <main>
    <div class="card card-sticky-top">
      <div class="toolbar">
        <h1>69業主合約進度</h1>
        <span id="cloud-load-status" class="cloud-load-status"></span>
        <div class="toolbar-actions">
          <a class="btn" href="./index.html" style="text-decoration:none; display:inline-flex; align-items:center;">↩ 返回</a>
        </div>
      </div>
      <p class="hint">上方固定欄位為樓層（B4F~PRF）。每筆次項目先按「設定樓層」勾選適用樓層，再切回「勾選統計」模式進行勾選計數。資料會暫存於本機瀏覽器。</p>

      <div class="summary" id="summary">
        <span class="muted">項目：<b id="sum-big">0</b></span>
        <span class="muted">次項目：<b id="sum-small">0</b></span>
        <span class="muted">完成/總數：<b id="sum-checked-total">0/0</b></span>
        <span class="muted">完成：<b id="sum-done-percent">0.00%</b></span>
      </div>

      <div class="grid-wrap" id="grid-wrap" style="--floor-count: 1;">
        <div class="grid-head" id="grid-head"></div>
      </div>
    </div>

    <div class="section" id="section"></div>

    <div class="card">
      <div class="footer-totals">
        <div class="footer-head">
          <h2>歷程瀏覽</h2>
          <button type="button" class="btn primary" id="save-history">保存</button>
        </div>
        <div id="history-snapshots" class="history-snapshots" aria-live="polite"><div class="history-empty">讀取中…</div></div>
        <p class="status" id="status" role="status" aria-live="polite"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";
    const SUBMIT_STATES_TABLE = "submit_states";
    const CLOUD_WORK_ZONE = "69";
    const CLOUD_TITLE = "default";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const FLOORS = [
      "B4F","B3F","B2F","B1F",
      ...Array.from({ length: 15 }, (_, i) => `${i + 1}F`),
      "R1F","R2F","R3F",
      "PRF",
    ];

    const STORAGE_KEY = "sumit:data:v1";

    /** @type {{ bigItems: { id: string, title: string, collapsed?: boolean, smallItems: { id: string, name: string, mode?: "setup" | "check", enabledFloors?: Record<string, boolean>, checks: Record<string, boolean> }[] }[] }} */
    let state = { bigItems: [] };
    let cloudUserId = null;
    let cloudSyncTimer = null;
    let cloudSyncInFlight = false;

    const elSection = document.getElementById("section");
    const elGridHead = document.getElementById("grid-head");
    const elGridWrap = document.getElementById("grid-wrap");
    const elHistorySnapshots = document.getElementById("history-snapshots");
    const elStatus = document.getElementById("status");
    const elCloudLoadStatus = document.getElementById("cloud-load-status");
    const elSaveHistory = document.getElementById("save-history");
    let cloudLoadFadeTimer = null;
    let cloudLoadFadeEndHandler = null;

    const elSumBig = document.getElementById("sum-big");
    const elSumSmall = document.getElementById("sum-small");
    const elSumCheckedTotal = document.getElementById("sum-checked-total");
    const elSumDonePercent = document.getElementById("sum-done-percent");

    function uid() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function setStatus(msg, kind) {
      elStatus.textContent = msg || "";
      elStatus.className = kind ? `status ${kind}` : "status";
    }

    function safeText(s) {
      if (s === null || s === undefined) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.bigItems)) {
          state = parsed;
        }
      } catch (_) {}
    }

    function saveLocal() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        setStatus(`儲存失敗：${err.message}`, "error");
      }
    }
    function scheduleCloudSave() {
      if (!cloudUserId) return;
      if (cloudSyncTimer) clearTimeout(cloudSyncTimer);
      cloudSyncTimer = setTimeout(async () => {
        if (cloudSyncInFlight) return;
        cloudSyncInFlight = true;
        try {
          const payload = {
            user_id: cloudUserId,
            work_zone: CLOUD_WORK_ZONE,
            title: CLOUD_TITLE,
            state_json: state,
            updated_at: new Date().toISOString(),
          };
          const { error } = await supabase
            .from(SUBMIT_STATES_TABLE)
            .upsert(payload, { onConflict: "user_id,work_zone,title" });
          if (error) throw error;
        } catch (err) {
          setStatus(`雲端同步失敗：${err.message}`, "error");
        } finally {
          cloudSyncInFlight = false;
        }
      }, 2500);
    }
    function saveAll() {
      saveLocal();
      scheduleCloudSave();
    }
    function showCloudLoadMessageThenFade(msg) {
      if (cloudLoadFadeTimer) {
        clearTimeout(cloudLoadFadeTimer);
        cloudLoadFadeTimer = null;
      }
      if (cloudLoadFadeEndHandler) {
        elCloudLoadStatus.removeEventListener("transitionend", cloudLoadFadeEndHandler);
        cloudLoadFadeEndHandler = null;
      }
      elCloudLoadStatus.textContent = msg;
      elCloudLoadStatus.style.opacity = "1";
      cloudLoadFadeTimer = setTimeout(() => {
        cloudLoadFadeTimer = null;
        cloudLoadFadeEndHandler = (e) => {
          if (e.propertyName !== "opacity") return;
          elCloudLoadStatus.removeEventListener("transitionend", cloudLoadFadeEndHandler);
          cloudLoadFadeEndHandler = null;
          elCloudLoadStatus.textContent = "";
          elCloudLoadStatus.style.opacity = "1";
        };
        elCloudLoadStatus.addEventListener("transitionend", cloudLoadFadeEndHandler);
        elCloudLoadStatus.style.opacity = "0";
      }, 5000);
    }
    async function initCloudState() {
      try {
        const { data: authData } = await supabase.auth.getUser();
        const user = authData?.user;
        if (!user) {
          setStatus("未登入：目前僅本機保存。", "muted");
          return;
        }
        cloudUserId = user.id;
        const { data, error } = await supabase
          .from(SUBMIT_STATES_TABLE)
          .select("state_json")
          .eq("user_id", user.id)
          .eq("work_zone", CLOUD_WORK_ZONE)
          .eq("title", CLOUD_TITLE)
          .maybeSingle();
        if (error) throw error;
        const cloudState = data?.state_json;
        if (cloudState && Array.isArray(cloudState.bigItems)) {
          state = cloudState;
          saveLocal();
          showCloudLoadMessageThenFade("已載入雲端資料。");
        } else {
          if (cloudLoadFadeTimer) {
            clearTimeout(cloudLoadFadeTimer);
            cloudLoadFadeTimer = null;
          }
          if (cloudLoadFadeEndHandler) {
            elCloudLoadStatus.removeEventListener("transitionend", cloudLoadFadeEndHandler);
            cloudLoadFadeEndHandler = null;
          }
          elCloudLoadStatus.textContent = "";
          elCloudLoadStatus.style.opacity = "1";
          setStatus("已啟用雲端同步。", "ok");
        }
      } catch (err) {
        setStatus(`雲端初始化失敗：${err.message}`, "error");
      }
    }
    async function saveHistorySnapshot() {
      try {
        const { data: authData } = await supabase.auth.getUser();
        const user = authData?.user;
        if (!user) {
          setStatus("未登入，無法保存歷程。", "error");
          return;
        }
        const now = new Date();
        const stamp = now.toISOString().replaceAll(":", "-");
        const historyTitle = `history-${stamp}`;
        const statsNow = computeAll();
        const payload = {
          user_id: user.id,
          work_zone: CLOUD_WORK_ZONE,
          title: historyTitle,
          state_json: {
            ...state,
            __meta: {
              saved_at: now.toISOString(),
              checked: statsNow.checkedCount,
              total: statsNow.totalSlots,
            },
          },
          version: 1,
        };
        const { error } = await supabase.from(SUBMIT_STATES_TABLE).insert([payload]);
        if (error) throw error;
        setStatus("已保存一筆歷程快照。", "ok");
        await fetchHistorySnapshots();
      } catch (err) {
        setStatus(`保存歷程失敗：${err.message}`, "error");
      }
    }

    function fmtHistoryDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "—";
      return d.toLocaleString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    /** 從快照 state 計算總完成與各「項目」完成率（不修改頁面 state） */
    function computeMetricsFromSnapshotState(raw) {
      const st = JSON.parse(JSON.stringify(raw || {}));
      if (st.__meta) delete st.__meta;
      if (!st.bigItems || !Array.isArray(st.bigItems)) {
        return { overallPct: "0.00", checked: 0, total: 0, items: [] };
      }
      let checked = 0;
      let total = 0;
      const items = [];
      for (const big of st.bigItems) {
        let bc = 0;
        let bt = 0;
        for (const s of big.smallItems || []) {
          ensureSmallState(s);
          bc += rowCheckedCount(s);
          bt += rowTotalSlotsCount(s);
        }
        checked += bc;
        total += bt;
        const pct = bt > 0 ? ((bc / bt) * 100).toFixed(2) : "0.00";
        const label = String(big.title || "").trim() || "（未命名項目）";
        items.push({ label, pct, checked: bc, total: bt });
      }
      const overallPct = total > 0 ? ((checked / total) * 100).toFixed(2) : "0.00";
      return { overallPct, checked, total, items };
    }

    async function fetchHistorySnapshots() {
      if (!elHistorySnapshots) return;
      elHistorySnapshots.innerHTML = `<div class="history-empty">讀取中…</div>`;
      try {
        const { data: authData } = await supabase.auth.getUser();
        const user = authData?.user;
        if (!user) {
          elHistorySnapshots.innerHTML = `<div class="history-empty">請登入後可查看最近保存的歷程。</div>`;
          return;
        }
        const { data: rows, error } = await supabase
          .from(SUBMIT_STATES_TABLE)
          .select("state_json, created_at, updated_at")
          .eq("user_id", user.id)
          .eq("work_zone", CLOUD_WORK_ZONE)
          .like("title", "history-%")
          .order("created_at", { ascending: false })
          .limit(5);
        if (error) throw error;
        const list = rows || [];
        if (list.length === 0) {
          elHistorySnapshots.innerHTML = `<div class="history-empty">尚無歷程紀錄。按下「保存」會新增一筆快照，最多顯示最近 5 筆。</div>`;
          return;
        }
        elHistorySnapshots.innerHTML = list
          .map((row) => {
            const meta = row.state_json?.__meta;
            const savedAt = meta?.saved_at || row.created_at || row.updated_at;
            const m = computeMetricsFromSnapshotState(row.state_json);
            const rowsHtml = m.items
              .map(
                (it) =>
                  `<tr><td>${safeText(it.label)}</td><td>${it.checked}／${it.total}</td><td>${it.pct}%</td></tr>`
              )
              .join("");
            return `
              <div class="history-snapshot">
                <div class="history-date">${safeText(fmtHistoryDate(savedAt))}</div>
                <div class="history-overall">總完成 <strong>${m.overallPct}%</strong>（${m.checked}／${m.total}）</div>
                <div class="history-item-table-wrap">
                  <table class="history-item-table">
                    <thead><tr><th>項目</th><th>完成/總數</th><th>完成</th></tr></thead>
                    <tbody>${rowsHtml || `<tr><td colspan="3">無項目</td></tr>`}</tbody>
                  </table>
                </div>
              </div>
            `;
          })
          .join("");
      } catch (err) {
        elHistorySnapshots.innerHTML = `<div class="history-empty" style="color:var(--danger);">讀取歷程失敗：${safeText(err.message)}</div>`;
      }
    }

    function ensureChecksObject(small) {
      if (!small.checks || typeof small.checks !== "object") small.checks = {};
      for (const f of FLOORS) {
        if (typeof small.checks[f] !== "boolean") small.checks[f] = false;
      }
    }

    function ensureSmallState(small) {
      ensureChecksObject(small);
      if (!small.enabledFloors || typeof small.enabledFloors !== "object") {
        small.enabledFloors = {};
      }
      for (const f of FLOORS) {
        if (typeof small.enabledFloors[f] !== "boolean") {
          // 舊資料相容：預設全部樓層可用
          small.enabledFloors[f] = true;
        }
      }
      if (small.mode !== "setup" && small.mode !== "check") {
        small.mode = "check";
      }
    }

    function rowCheckedCount(small) {
      ensureSmallState(small);
      let n = 0;
      for (const f of FLOORS) {
        if (small.enabledFloors[f] && small.checks[f]) n++;
      }
      return n;
    }
    function rowTotalSlotsCount(small) {
      ensureSmallState(small);
      let n = 0;
      for (const f of FLOORS) {
        if (small.enabledFloors[f]) n++;
      }
      return n;
    }

    function computeAll() {
      const colTotals = Object.fromEntries(FLOORS.map((f) => [f, 0]));
      let smallCount = 0;
      let checkedCount = 0;
      let totalSlots = 0;

      for (const big of state.bigItems) {
        for (const s of big.smallItems) {
          smallCount++;
          ensureSmallState(s);
          for (const f of FLOORS) {
            if (s.enabledFloors[f]) {
              totalSlots += 1;
              if (s.checks[f]) {
                colTotals[f] += 1;
                checkedCount += 1;
              }
            }
          }
        }
      }

      return {
        bigCount: state.bigItems.length,
        smallCount,
        checkedCount,
        totalSlots,
        colTotals,
      };
    }

    function renderHeader() {
      elGridWrap.style.setProperty("--floor-count", String(FLOORS.length));
      elGridHead.innerHTML = `
        <div class="grid-row">
          <div class="grid-cell">項目</div>
          ${FLOORS.map((f) => `<div class="grid-cell">${safeText(f)}</div>`).join("")}
          <div class="grid-cell"><button type="button" class="btn primary head-add-big-btn" data-add-big-header>＋新增項目</button></div>
        </div>
      `;
    }

    function render() {
      renderHeader();
      const stats = computeAll();

      elSumBig.textContent = String(stats.bigCount);
      elSumSmall.textContent = String(stats.smallCount);
      elSumCheckedTotal.textContent = `${stats.checkedCount}/${stats.totalSlots}`;
      elSumDonePercent.textContent = `${stats.totalSlots > 0 ? ((stats.checkedCount / stats.totalSlots) * 100).toFixed(2) : "0.00"}%`;

      elSection.innerHTML = state.bigItems
        .map((big) => {
          const bigChecked = big.smallItems.reduce((acc, s) => acc + rowCheckedCount(s), 0);
          const bigTotalSlots = big.smallItems.reduce((acc, s) => acc + rowTotalSlotsCount(s), 0);
          const donePercent = bigTotalSlots > 0 ? ((bigChecked / bigTotalSlots) * 100).toFixed(2) : "0.00";
          const collapsed = Boolean(big.collapsed);
          return `
            <div class="card">
              <section class="big-card" data-big-id="${safeText(big.id)}">
                <div class="big-card-head">
                  <div class="big-title">
                    <input type="text" data-big-title value="${safeText(big.title || "")}" placeholder="輸入項目名稱" />
                  </div>
                  <div class="big-meta">
                    <span>次項目：<b style="color:#fff;">${big.smallItems.length}</b></span>
                    <span>完成/總數：<b style="color:#fff;">${bigChecked}/${bigTotalSlots}</b></span>
                    <span>完成：<b style="color:#fff;">${donePercent}%</b></span>
                  </div>
                  <div class="big-actions">
                    <button type="button" class="btn collapse-toggle-btn" data-toggle-collapse title="摺疊/展開次項目">${collapsed ? "展開" : "摺疊"}</button>
                    <button type="button" class="btn primary" data-add-small>＋ 新增次項目</button>
                    <button type="button" class="btn danger" data-del-big>刪除</button>
                  </div>
                </div>
                <div class="big-body" ${collapsed ? "hidden" : ""}>
                  <div class="small-list">
                    ${
                      big.smallItems.length
                        ? big.smallItems
                            .map((s) => {
                              ensureSmallState(s);
                              const rowTotal = rowCheckedCount(s);
                              const isSetupMode = s.mode === "setup";
                              return `
                                <div class="small-row" data-small-id="${safeText(s.id)}">
                                  <div class="small-grid" style="--floor-count:${FLOORS.length};">
                                    <div class="grid-row">
                                      <div class="grid-cell" style="justify-content:flex-start;">
                                        <input class="small-grid-name-input" type="text" data-small-name value="${safeText(s.name || "")}" placeholder="輸入次項目名稱" />
                                      </div>
                                      ${FLOORS.map((f) => {
                                        if (isSetupMode) {
                                          const enabled = s.enabledFloors[f] ? "checked" : "";
                                          return `<div class="grid-cell"><input class="check" type="checkbox" data-floor-enable="${safeText(f)}" ${enabled} title="此樓層是否納入次項目" /></div>`;
                                        }
                                        if (!s.enabledFloors[f]) {
                                          return `<div class="grid-cell"><span class="floor-na">－</span></div>`;
                                        }
                                        const checked = s.checks[f] ? "checked" : "";
                                        return `<div class="grid-cell"><input class="check" type="checkbox" data-floor="${safeText(f)}" ${checked} title="勾選計入統計" /></div>`;
                                      }).join("")}
                                      <div class="grid-cell">
                                        <span class="small-grid-end">
                                          <button type="button" class="btn mode" data-toggle-mode>${isSetupMode ? "確定" : "設定樓層"}</button>
                                          <button type="button" class="btn danger" data-del-small>刪除</button>
                                        </span>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              `;
                            })
                            .join("")
                        : `<div class="muted" style="padding: 10px 4px;">尚無次項目，請按「新增次項目」。</div>`
                    }
                  </div>
                </div>
              </section>
            </div>
          `;
        })
        .join("");
    }

    function addBig() {
      state.bigItems.unshift({
        id: uid(),
        title: "",
        collapsed: false,
        smallItems: [],
      });
      saveAll();
      render();
      setStatus("已新增項目。", "ok");
    }

    function addSmall(bigId) {
      const big = state.bigItems.find((b) => b.id === bigId);
      if (!big) return;
      big.smallItems.push({
        id: uid(),
        name: "",
        mode: "setup",
        enabledFloors: Object.fromEntries(FLOORS.map((f) => [f, true])),
        checks: Object.fromEntries(FLOORS.map((f) => [f, false])),
      });
      saveAll();
      render();
      setStatus("已新增次項目。", "ok");
    }

    function delBig(bigId) {
      state.bigItems = state.bigItems.filter((b) => b.id !== bigId);
      saveAll();
      render();
      setStatus("已刪除項目。", "ok");
    }

    function delSmall(bigId, smallId) {
      const big = state.bigItems.find((b) => b.id === bigId);
      if (!big) return;
      big.smallItems = big.smallItems.filter((s) => s.id !== smallId);
      saveAll();
      render();
      setStatus("已刪除次項目。", "ok");
    }

    elGridHead.addEventListener("click", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.closest("[data-add-big-header]")) addBig();
    });
    elSaveHistory.addEventListener("click", () => {
      saveHistorySnapshot();
    });

    elSection.addEventListener("click", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      const bigEl = target.closest("[data-big-id]");
      if (!bigEl) return;
      const bigId = bigEl.getAttribute("data-big-id");
      if (!bigId) return;

      if (target.hasAttribute("data-add-small")) {
        addSmall(bigId);
        return;
      }
      if (target.hasAttribute("data-del-big")) {
        if (!confirm("確定要刪除此項目？")) return;
        delBig(bigId);
        return;
      }
      if (target.hasAttribute("data-toggle-collapse")) {
        const big = state.bigItems.find((b) => b.id === bigId);
        if (!big) return;
        big.collapsed = !Boolean(big.collapsed);
        saveAll();
        render();
        return;
      }

      const smallEl = target.closest("[data-small-id]");
      if (smallEl && target.hasAttribute("data-del-small")) {
        const smallId = smallEl.getAttribute("data-small-id");
        if (!smallId) return;
        if (!confirm("確定要刪除此次項目？")) return;
        delSmall(bigId, smallId);
        return;
      }

      if (smallEl && target.hasAttribute("data-toggle-mode")) {
        const smallId = smallEl.getAttribute("data-small-id");
        if (!smallId) return;
        const small = state.bigItems
          .find((b) => b.id === bigId)
          ?.smallItems.find((s) => s.id === smallId);
        if (!small) return;
        ensureSmallState(small);
        small.mode = small.mode === "setup" ? "check" : "setup";
        saveAll();
        render();
      }
    });

    elSection.addEventListener("input", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLInputElement)) return;
      const bigEl = target.closest("[data-big-id]");
      if (!bigEl) return;
      const bigId = bigEl.getAttribute("data-big-id");
      if (!bigId) return;
      const big = state.bigItems.find((b) => b.id === bigId);
      if (!big) return;

      if (target.hasAttribute("data-big-title")) {
        big.title = target.value;
        saveAll();
        return;
      }
      if (target.hasAttribute("data-small-name")) {
        const smallEl = target.closest("[data-small-id]");
        const smallId = smallEl?.getAttribute("data-small-id");
        if (!smallId) return;
        const small = big.smallItems.find((s) => s.id === smallId);
        if (!small) return;
        small.name = target.value;
        saveAll();
      }
    });

    elSection.addEventListener("change", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.type !== "checkbox") return;
      const bigEl = target.closest("[data-big-id]");
      const smallEl = target.closest("[data-small-id]");
      const bigId = bigEl?.getAttribute("data-big-id");
      const smallId = smallEl?.getAttribute("data-small-id");
      if (!bigId || !smallId) return;

      const big = state.bigItems.find((b) => b.id === bigId);
      const small = big?.smallItems.find((s) => s.id === smallId);
      if (!big || !small) return;
      ensureSmallState(small);

      const floorEnable = target.getAttribute("data-floor-enable");
      if (floorEnable) {
        small.enabledFloors[floorEnable] = target.checked;
        if (!target.checked) {
          small.checks[floorEnable] = false;
        }
        saveAll();
        render();
        return;
      }

      const floor = target.getAttribute("data-floor");
      if (!floor || !small.enabledFloors[floor]) return;
      small.checks[floor] = target.checked;
      saveAll();
      render();
    });

    loadLocal();
    if (state.bigItems.length === 0) {
      state.bigItems = [
        { id: uid(), title: "（範例）項目", collapsed: false, smallItems: [{ id: uid(), name: "（範例）次項目", checks: Object.fromEntries(FLOORS.map((f) => [f, false])) }] },
      ];
      saveAll();
    }
    render();
    await initCloudState();
    render();
    await fetchHistorySnapshots();
  </script>
</body>
</html>
