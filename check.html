<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>記錄送出</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --danger: #f87171;
      --ok: #4ade80;
      --btn-secondary-bg: #2a3038;
      --btn-secondary-hover: #383e4a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 400px;
      margin: 0 auto;
      padding: 8px 12px 0;
    }
    form {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 8px 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    select, textarea, input[readonly], input[type="file"] {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }
    select, textarea, input[readonly] {
      padding: 10px 12px;
      font-size: 16px;
    }
    input[type="file"] {
      padding: 8px;
      font-size: 14px;
      border-style: dashed;
    }
    .select-with-reset {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .select-with-reset > select {
      flex: 1 1 auto;
      min-width: 0;
    }
    .select-reset-btn {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--btn-secondary-bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .select-reset-btn:hover {
      background: var(--btn-secondary-hover);
      border-color: var(--accent);
      color: #fff;
    }
    select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    textarea { height: 64px; resize: none; }
    /* 標題左緣與 select/textarea/input 左邊界切齊（不另縮排） */
    .section-title {
      font-size: 16px;
      color: var(--muted);
      margin: 0 0 2px 0;
      padding-left: 0;
      font-weight: 600;
    }
    p.section-title {
      margin-top: 0;
      margin-bottom: 2px;
    }
    label.section-title {
      display: block;
      margin: 0 0 2px 0;
    }
    .serial-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .serial-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .serial-header .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: auto;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      background: var(--btn-secondary-bg);
      font-family: inherit;
      white-space: nowrap;
    }
    .serial-header .back-btn:hover {
      background: var(--btn-secondary-hover);
      border-color: var(--accent);
      color: #fff;
    }
    .serial-number-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    .serial-number-row .section-title {
      display: inline-block;
      margin: 0;
      padding-left: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .serial-number-row #serial {
      flex: 1 1 auto;
      width: auto;
      min-width: 12ch;
      box-sizing: border-box;
    }
    .work-zone-inline {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .serial-header .section-title {
      margin: 0;
    }
    .work-zone-inline .work-zone-heading {
      margin-right: 0;
    }
    .serial-header .work-zone-tag {
      color: #fff;
      font-weight: 700;
      font-size: 30px;
      line-height: 1.2;
      flex-shrink: 0;
      min-width: 2em;
    }
    #submit-btn {
      margin-top: 14px;
    }
    button[type="submit"] {
      margin-bottom: 0;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button[type="submit"]:hover:not(:disabled) { background: var(--accent-hover); }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }
    #status {
      min-height: 1em;
      font-size: 14px;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    #status.error { color: var(--danger); }
    #status.success { color: var(--ok); }
    #auth-status {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
      min-height: 1.5em;
    }
    #auth-status.hidden { display: none; }
    .query-card {
      margin-top: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px 12px;
    }
    #query-missing-btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    #query-missing-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #query-missing-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    #query-warning {
      display: none;
      margin: 5px 0 0;
      color: var(--danger);
      font-size: 14px;
      text-align: center;
    }
    #query-warning:not(:empty) {
      display: block;
    }
    .missing-result-row {
      margin: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0px;
    }
    .missing-result-row[hidden] {
      display: none;
    }
    #missing-result {
      margin: 0;
      min-height: 1.2em;
      color: var(--ok);
      font-size: 14px;
    }
    .missing-hint {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .missing-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .missing-item {
      border: 1px solid rgba(70, 92, 128, 0.5);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.12);
      padding: 8px 10px 8px 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 20px;
      align-items: start;
      gap: 8px;
    }
    .missing-item-main {
      min-width: 0;
      line-height: 1.45;
      word-break: break-word;
      font-size: 14px;
    }
    .missing-item-row {
      margin: 0;
    }
    .missing-item-row + .missing-item-row {
      margin-top: 4px;
    }
    .missing-photo-link {
      color: #9ac7ff;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 600;
    }
    .missing-photo-link:hover {
      color: #fff;
    }
    .missing-item-check {
      width: 20px;
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-right: 10px;
    }
    .missing-check {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .photo-modal[hidden] { display: none; }
    .photo-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .photo-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
    }
    .photo-modal-dialog {
      position: relative;
      z-index: 1;
      width: min(92vw, 720px);
      max-height: 90vh;
      background: #0f1419;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .photo-modal-img-wrap {
      min-height: 120px;
      max-height: calc(90vh - 90px);
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(70, 92, 128, 0.45);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      padding: 6px;
    }
    .photo-modal-img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .photo-modal-close {
      align-self: center;
      width: 80px;
      border: none;
      border-radius: 8px;
      padding: 8px 0;
      font-size: 16px;
      font-weight: 700;
      background: var(--btn-secondary-bg);
      color: #fff;
      cursor: pointer;
    }
    .photo-modal-close:hover { background: var(--btn-secondary-hover); }
  </style>
</head>
<body>
  <main>
    <p id="auth-status" role="status" aria-live="polite">驗證登入中…</p>
    <form id="record-form" inert novalidate>
      <div class="serial-block">
        <div class="serial-header">
          <div class="work-zone-inline">
            <span class="section-title work-zone-heading">工區</span>
            <span class="work-zone-tag" id="work-zone-display" title="工區">69</span>
          </div>
          <a class="back-btn" href="./index.html">↩ 返回</a>
        </div>
        <input type="hidden" id="work-zone" name="workZone" value="69" />
        <div class="serial-number-row">
          <label for="serial" class="section-title">編號</label>
          <input id="serial" name="serial" type="text" readonly />
        </div>
      </div>

      <div>
        <p class="section-title">樓層</p>
        <div class="select-with-reset">
          <select id="floor" name="floor" required>
            <option value="" disabled selected>請選擇</option>
          </select>
          <button type="button" id="clear-floor-btn" class="select-reset-btn">清除</button>
        </div>
      </div>

      <div>
        <p class="section-title">位置</p>
        <div class="select-with-reset">
          <select id="loc1" name="loc1" required>
            <option value="" disabled selected>請選擇</option>
          </select>
          <button type="button" id="clear-loc1-btn" class="select-reset-btn">清除</button>
        </div>
        <div style="margin-top:5px;">
          <select id="loc2" name="loc2" required disabled>
            <option value="" disabled selected>請先選擇 位置1</option>
          </select>
        </div>
        <div style="margin-top:5px;">
          <select id="loc3" name="loc3" required disabled>
            <option value="" disabled selected>請先選擇 位置2</option>
          </select>
        </div>
      </div>

      <div>
        <p class="section-title">廠商</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <select id="vendor1" name="vendor1" required>
            <option value="" disabled selected>請選擇</option>
          </select>
          <div class="select-with-reset">
            <select id="vendor2" name="vendor2" required disabled>
              <option value="" disabled selected>請先選擇 廠商1</option>
            </select>
            <button type="button" id="clear-vendor2-btn" class="select-reset-btn">清除</button>
          </div>
        </div>
      </div>

      <div>
        <label for="description" class="section-title">說明</label>
        <textarea id="description" name="description" placeholder="請輸入說明..." required></textarea>
      </div>
      <div>
        <label for="category" class="section-title">分類</label>
        <select id="category" name="category" required>
          <option value="" disabled selected>請選擇</option>
        </select>
      </div>
      <div>
        <label for="photo" class="section-title">照片</label>
        <input type="file" id="photo" name="photo" accept="image/*" required />
      </div>
      <button type="submit" id="submit-btn">送出至 Supabase</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
    <section class="query-card" aria-label="查詢缺失卡片">
      <button type="button" id="query-missing-btn">查詢缺失</button>
      <p id="query-warning" role="status" aria-live="polite"></p>
      <div id="missing-result-row" class="missing-result-row" hidden>
        <p id="missing-result" role="status" aria-live="polite"></p>
        <span class="missing-hint">完成請打勾</span>
      </div>
      <ol id="missing-list" class="missing-list"></ol>
    </section>
  </main>
  <div id="photo-modal" class="photo-modal" hidden aria-hidden="true">
    <div class="photo-modal-backdrop" aria-hidden="true"></div>
    <div class="photo-modal-dialog" role="dialog" aria-modal="true" aria-label="照片預覽">
      <div class="photo-modal-img-wrap">
        <img id="photo-modal-img" class="photo-modal-img" alt="照片預覽" />
      </div>
      <button type="button" id="photo-modal-close" class="photo-modal-close">X</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";
    const PROFILE_TABLE = "profiles";
    const DB_COLUMNS = {
      serial: "編號",
      work_zone: "工區",
      floor: "樓層",
      category: "分類",
      loc1: "位置1",
      loc2: "位置2",
      loc3: "位置3",
      vendor1: "廠商1",
      vendor2: "廠商2",
      description: "說明",
      photo: "照片",
      from: "來自",
    };
    const FLOOR_OPTIONS = ["1F", "2F", "3F", "B1", "B2"];
    const CATEGORY_OPTIONS = ["設備", "清潔", "維修", "巡檢", "其他"];
    const LOCATION_TREE = {
      A區: { 一段: ["A-一段-001", "A-一段-002"], 二段: ["A-二段-001"] },
      B區: { 北側: ["B-北側-101"], 南側: ["B-南側-201"] },
    };
    const VENDOR_TREE = {
      甲公司: ["甲-北區", "甲-中區"],
      乙公司: ["乙-一部", "乙-二部"],
    };
    const STORAGE_BUCKET = "Public";
    const STORAGE_OBJECT_PREFIX = "Rublic";
    /** 與畫面「工區」標籤一致，寫入 records.工區；編號前綴使用此字串 */
    const WORK_ZONE_VALUE = "69";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const LOGIN_URL = "./login.html?next=check.html";

    const form = document.getElementById("record-form");
    const serialInput = document.getElementById("serial");
    const floorSelect = document.getElementById("floor");
    const categorySelect = document.getElementById("category");
    const loc1Select = document.getElementById("loc1");
    const loc2Select = document.getElementById("loc2");
    const loc3Select = document.getElementById("loc3");
    const vendor1Select = document.getElementById("vendor1");
    const vendor2Select = document.getElementById("vendor2");
    const clearFloorBtn = document.getElementById("clear-floor-btn");
    const clearLoc1Btn = document.getElementById("clear-loc1-btn");
    const clearVendor2Btn = document.getElementById("clear-vendor2-btn");
    const descriptionEl = document.getElementById("description");
    const photoInput = document.getElementById("photo");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");
    const authStatusEl = document.getElementById("auth-status");
    const queryMissingBtn = document.getElementById("query-missing-btn");
    const queryWarningEl = document.getElementById("query-warning");
    const missingResultRowEl = document.getElementById("missing-result-row");
    const missingResultEl = document.getElementById("missing-result");
    const missingListEl = document.getElementById("missing-list");
    const photoModalEl = document.getElementById("photo-modal");
    const photoModalImgEl = document.getElementById("photo-modal-img");
    const photoModalCloseEl = document.getElementById("photo-modal-close");
    let statusTimer = null;
    let queryWarningTimer = null;

    function redirectToLogin() {
      window.location.href = LOGIN_URL;
    }

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === "INITIAL_SESSION") return;
      if (!session) redirectToLogin();
    });

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind || "";
    }
    function startLoadingStatus(base) {
      if (statusTimer) clearInterval(statusTimer);
      let step = 0;
      setStatus(base);
      statusTimer = setInterval(() => {
        step = (step + 1) % 4;
        setStatus(`${base}${".".repeat(step)}`);
      }, 350);
    }
    function stopLoadingStatus() {
      if (statusTimer) clearInterval(statusTimer);
      statusTimer = null;
    }
    function setMissingStatus(msg) {
      missingResultEl.textContent = msg;
    }
    function showQueryWarning(msg) {
      if (queryWarningTimer) clearTimeout(queryWarningTimer);
      queryWarningEl.textContent = msg;
      queryWarningTimer = setTimeout(() => {
        queryWarningEl.textContent = "";
        queryWarningTimer = null;
      }, 3000);
    }
    function showMissingResultRow(show) {
      missingResultRowEl.hidden = !show;
    }
    function openPhotoModal(url) {
      photoModalImgEl.src = url;
      photoModalEl.hidden = false;
      photoModalEl.setAttribute("aria-hidden", "false");
    }
    function closePhotoModal() {
      photoModalEl.hidden = true;
      photoModalEl.setAttribute("aria-hidden", "true");
      photoModalImgEl.removeAttribute("src");
    }
    function clearMissingList() {
      missingListEl.innerHTML = "";
    }
    function renderMissingList(rows) {
      if (!rows || rows.length === 0) {
        clearMissingList();
        setMissingStatus("篩選符合共 0 筆。");
        showMissingResultRow(true);
        return;
      }
      const html = rows
        .map((r) => {
          const serialKey = String(r[DB_COLUMNS.serial] ?? "").trim();
          const serial = String(r[DB_COLUMNS.serial] ?? "").trim() || "（無編號）";
          const category = String(r[DB_COLUMNS.category] ?? "").trim() || "（無分類）";
          const loc1 = String(r[DB_COLUMNS.loc1] ?? "").trim();
          const loc2 = String(r[DB_COLUMNS.loc2] ?? "").trim();
          const loc3 = String(r[DB_COLUMNS.loc3] ?? "").trim();
          const locDisplay = [loc1, loc2, loc3].filter(Boolean).join("/");
          const vendor2 = String(r[DB_COLUMNS.vendor2] ?? "").trim() || "（無廠商2）";
          const desc = String(r[DB_COLUMNS.description] ?? "").trim() || "（無說明）";
          const photo = String(r[DB_COLUMNS.photo] ?? "").trim();
          const from = String(r[DB_COLUMNS.from] ?? "").trim() || "未知來源";
          const doneRaw = r["勾選1"] ?? r["完成"];
          const done = doneRaw === true || doneRaw === "true" || doneRaw === 1 || doneRaw === "1" || doneRaw === "Y";
          const photoHtml = photo
            ? `<a class="missing-photo-link" href="${escapeHtml(photo)}" target="_blank" rel="noopener noreferrer">照片</a>`
            : "（無）";
          const checkHtml = serialKey
            ? `<input type="checkbox" class="missing-check" data-row-serial="${escapeHtml(serialKey)}" ${done ? "checked" : ""} />`
            : `<input type="checkbox" class="missing-check" disabled title="缺少編號，無法寫回" />`;
          return `<li class="missing-item"><div class="missing-item-main"><p class="missing-item-row"><strong>${escapeHtml(serial)}</strong> | ${escapeHtml(category)} | ${escapeHtml(vendor2)} | ${escapeHtml(from)}</p><p class="missing-item-row">${escapeHtml(locDisplay || "（無位置）")} | ${photoHtml}</p><p class="missing-item-row">${escapeHtml(desc)}</p></div><div class="missing-item-check">${checkHtml}</div></li>`;
        })
        .join("");
      missingListEl.innerHTML = html;
      setMissingStatus(`篩選符合共 ${rows.length} 筆。`);
      showMissingResultRow(true);
    }
    function getTodayDateYMD() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
    function resetSelect(select, placeholder) {
      select.innerHTML = `<option value="" disabled selected>${placeholder}</option>`;
    }
    function fillSelect(select, options) {
      for (const opt of options) {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        select.appendChild(o);
      }
    }
    function fillSelectFromList(select, options, placeholder) {
      resetSelect(select, placeholder);
      fillSelect(select, options);
    }
    function getFileExt(file) {
      const m = (file.name || "").match(/\.([a-zA-Z0-9]+)$/);
      return m ? `.${m[1]}` : ".jpg";
    }
    function generatePhotoObjectName(file) {
      const now = new Date();
      const p2 = (n) => String(n).padStart(2, "0");
      const p3 = (n) => String(n).padStart(3, "0");
      return `${now.getFullYear()}${p2(now.getMonth() + 1)}${p2(now.getDate())}${p2(now.getSeconds())}${p3(now.getMilliseconds())}${getFileExt(file)}`;
    }
    function getWorkZoneTag() {
      const el = document.getElementById("work-zone");
      const v = (el?.value ?? WORK_ZONE_VALUE).toString().trim();
      return v || WORK_ZONE_VALUE;
    }
    /** 工區標籤-YYMMDD-三位數兩位英文；工區標籤與 records.工區 一致 */
    function generateSerialNumber() {
      const tag = getWorkZoneTag();
      const now = new Date();
      const p2 = (n) => String(n).padStart(2, "0");
      const yy = p2(now.getFullYear() % 100);
      const mm = p2(now.getMonth() + 1);
      const dd = p2(now.getDate());
      const rnd3 = String(Math.floor(Math.random() * 1000)).padStart(3, "0");
      const letter = () => String.fromCharCode(65 + Math.floor(Math.random() * 26));
      return `${tag}-${yy}${mm}${dd}-${rnd3}${letter()}${letter()}`;
    }

    fillSelect(floorSelect, FLOOR_OPTIONS);
    fillSelect(categorySelect, CATEGORY_OPTIONS);
    fillSelectFromList(loc1Select, Object.keys(LOCATION_TREE), "請選擇");
    fillSelectFromList(vendor1Select, Object.keys(VENDOR_TREE), "請選擇");
    resetSelect(loc2Select, "-"); //請先選擇位置1
    resetSelect(loc3Select, "-"); //請先選擇位置2
    resetSelect(vendor2Select, "-"); //請先選擇廠商1
    loc2Select.disabled = true;
    loc3Select.disabled = true;
    vendor2Select.disabled = true;
    serialInput.value = generateSerialNumber();

    loc1Select.addEventListener("change", () => {
      const level2 = Object.keys(LOCATION_TREE[loc1Select.value] || {});
      fillSelectFromList(loc2Select, level2, "請選擇");
      loc2Select.disabled = level2.length === 0;
      resetSelect(loc3Select, "請先選擇 位置2");
      loc3Select.disabled = true;
    });
    loc2Select.addEventListener("change", () => {
      const level3 = LOCATION_TREE[loc1Select.value]?.[loc2Select.value] || [];
      fillSelectFromList(loc3Select, level3, "請選擇");
      loc3Select.disabled = level3.length === 0;
    });
    vendor1Select.addEventListener("change", () => {
      const level2 = VENDOR_TREE[vendor1Select.value] || [];
      fillSelectFromList(vendor2Select, level2, "請選擇");
      vendor2Select.disabled = level2.length === 0;
    });
    clearFloorBtn.addEventListener("click", () => {
      floorSelect.selectedIndex = 0;
    });
    clearLoc1Btn.addEventListener("click", () => {
      loc1Select.selectedIndex = 0;
      resetSelect(loc2Select, "請先選擇 位置1");
      resetSelect(loc3Select, "請先選擇 位置2");
      loc2Select.disabled = true;
      loc3Select.disabled = true;
    });
    clearVendor2Btn.addEventListener("click", () => {
      vendor2Select.selectedIndex = 0;
    });

    (async function gateCheckPage() {
      const {
        data: { session },
      } = await supabase.auth.getSession();
      if (!session) {
        redirectToLogin();
        return;
      }
      form.removeAttribute("inert");
      authStatusEl.classList.add("hidden");
    })();

    queryMissingBtn.addEventListener("click", async () => {
      const floor = floorSelect.value.trim();
      const loc1 = loc1Select.value.trim();
      const loc2 = loc2Select.value.trim();
      const loc3 = loc3Select.value.trim();
      const vendor2 = vendor2Select.value.trim();
      const category = categorySelect.value.trim();
      const hasAnyFilter = Boolean(floor || loc1 || loc2 || loc3 || vendor2 || category);
      if (!hasAnyFilter) {
        showQueryWarning("請設置條件");
        return;
      }

      queryMissingBtn.disabled = true;
      queryWarningEl.textContent = "";
      showMissingResultRow(false);
      clearMissingList();

      let query = supabase.from("records").select("編號, 分類, 位置1, 位置2, 位置3, 廠商2, 說明, 照片, 來自, 勾選1");
      if (floor) query = query.eq(DB_COLUMNS.floor, floor);
      if (loc1) query = query.eq(DB_COLUMNS.loc1, loc1);
      if (loc2) query = query.eq(DB_COLUMNS.loc2, loc2);
      if (loc3) query = query.eq(DB_COLUMNS.loc3, loc3);
      if (vendor2) query = query.eq(DB_COLUMNS.vendor2, vendor2);
      if (category) query = query.eq(DB_COLUMNS.category, category);
      const { data: rows, error } = await query.order(DB_COLUMNS.serial, { ascending: true });

      queryMissingBtn.disabled = false;
      if (error) {
        showMissingResultRow(false);
        setMissingStatus(`查詢失敗：${error.message || "未知錯誤"}`);
        return;
      }
      renderMissingList(rows || []);
    });
    missingListEl.addEventListener("click", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      const link = target.closest(".missing-photo-link");
      if (!link) return;
      e.preventDefault();
      const href = link.getAttribute("href") || "";
      if (!href) return;
      openPhotoModal(href);
    });
    missingListEl.addEventListener("change", async (e) => {
      const target = e.target;
      if (!(target instanceof HTMLInputElement) || !target.classList.contains("missing-check")) return;
      const rowSerial = (target.dataset.rowSerial || "").trim();
      if (!rowSerial) return;
      const checked = target.checked;
      target.disabled = true;
      const patch = { 勾選1: checked, 勾選時間1: checked ? getTodayDateYMD() : null };
      const { error } = await supabase.from("records").update(patch).eq(DB_COLUMNS.serial, rowSerial);
      target.disabled = false;
      if (error) {
        target.checked = !checked;
        setMissingStatus(`更新完成狀態失敗：${error.message || "未知錯誤"}`);
        return;
      }
      setMissingStatus(checked ? "已更新為完成。" : "已取消完成。");
    });
    photoModalCloseEl.addEventListener("click", closePhotoModal);
    photoModalEl.addEventListener("click", (e) => {
      const target = e.target;
      if (target instanceof HTMLElement && target.classList.contains("photo-modal-backdrop")) closePhotoModal();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const {
        data: { session },
      } = await supabase.auth.getSession();
      if (!session) {
        setStatus("請先登入。", "error");
        redirectToLogin();
        return;
      }

      const workZone = getWorkZoneTag();
      const serial = generateSerialNumber();
      serialInput.value = serial;
      const floor = floorSelect.value.trim();
      const category = categorySelect.value.trim();
      const loc1 = loc1Select.value.trim();
      const loc2 = loc2Select.value.trim();
      const loc3 = loc3Select.value.trim();
      const vendor1 = vendor1Select.value.trim();
      const vendor2 = vendor2Select.value.trim();
      const description = descriptionEl.value.trim();
      const photoFile = photoInput.files?.[0];

      if (!floor || !category || !loc1 || !loc2 || !loc3 || !vendor1 || !vendor2 || !description) {
        setStatus("請完成樓層、分類、位置、廠商與說明。", "error");
        return;
      }
      if (!photoFile) {
        setStatus("請選擇照片。", "error");
        return;
      }

      submitBtn.disabled = true;
      startLoadingStatus("上傳照片中");
      const objectPath = `${STORAGE_OBJECT_PREFIX}/${generatePhotoObjectName(photoFile)}`;
      const { error: uploadError } = await supabase.storage.from(STORAGE_BUCKET).upload(objectPath, photoFile, {
        contentType: photoFile.type || "image/*",
        upsert: false,
      });
      stopLoadingStatus();
      if (uploadError) {
        submitBtn.disabled = false;
        setStatus(
          `【照片上傳】${uploadError.message || "失敗"}（若為 RLS，請在 Supabase 執行 storage_public_rls.sql）`,
          "error"
        );
        return;
      }

      const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(objectPath);

      const { data: profile, error: profileError } = await supabase
        .from(PROFILE_TABLE)
        .select("username")
        .eq("id", session.user.id)
        .maybeSingle();

      if (profileError) {
        submitBtn.disabled = false;
        setStatus(`讀取使用者名稱失敗：${profileError.message}`, "error");
        return;
      }

      const meta = session.user.user_metadata || {};
      const userName =
        (profile?.username && String(profile.username).trim()) ||
        (meta.full_name && String(meta.full_name).trim()) ||
        (meta.name && String(meta.name).trim()) ||
        session.user.email?.trim() ||
        "未知使用者";

      const payload = {
        [DB_COLUMNS.serial]: serial,
        [DB_COLUMNS.work_zone]: workZone,
        [DB_COLUMNS.floor]: floor,
        [DB_COLUMNS.category]: category,
        [DB_COLUMNS.loc1]: loc1,
        [DB_COLUMNS.loc2]: loc2,
        [DB_COLUMNS.loc3]: loc3,
        [DB_COLUMNS.vendor1]: vendor1,
        [DB_COLUMNS.vendor2]: vendor2,
        [DB_COLUMNS.description]: description,
        [DB_COLUMNS.photo]: data?.publicUrl || objectPath,
        [DB_COLUMNS.from]: userName,
      };

      startLoadingStatus("送出中");
      const { error: insertError } = await supabase.from("records").insert([payload]);
      stopLoadingStatus();
      submitBtn.disabled = false;
      if (insertError) {
        setStatus(
          `【資料庫寫入】${insertError.message || "失敗"}（請確認已執行 records_rls.sql 且為登入狀態）`,
          "error"
        );
        return;
      }

      setStatus("已成功儲存。", "success");
      form.reset();
      resetSelect(loc2Select, "請先選擇 位置1");
      resetSelect(loc3Select, "請先選擇 位置2");
      resetSelect(vendor2Select, "請先選擇 廠商1");
      loc2Select.disabled = true;
      loc3Select.disabled = true;
      vendor2Select.disabled = true;
      serialInput.value = generateSerialNumber();
    });
  </script>
</body>
</html>
