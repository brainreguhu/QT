<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Supabase HTML 範例</title>
  <style>
    /* 整體背景及文字顏色 */
    body { 
      font-family: sans-serif; 
      padding: 20px; 
      background: #121212; 
      color: #ffffff; 
    }

    /* 卡片背景顏色 */
    .card { 
      display: flex !important;
      flex-direction: column !important;/* 讓內容由上往下排 */
      align-items: center !important; /* 關鍵：水平置中所有子元素 */

      background: #1e1e1e; 
      padding: 10px; 
      border-radius: 20px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
      max-width: 400px; 
      margin: auto; 
    }

    label { display: block; margin-top: 10px; font-weight: bold; color: #bbbbbb; }

    h4 {
      display: block;        /* 確保是區塊元素 */
      text-align: center;    /* 文字水平置中 */
      font-size: 20px;       /* 加大字體 */
      font-weight: bold;     /* 加粗 */
      color: gray;           /* 深灰色 */
      margin-top: 0px;      /* 上方間距 */
      margin-bottom: 0px;   /* 與下方元件的間距 */
    }

    /* 輸入框改顏色 */
    select, textarea, input { 
      width: 100%;
      display: block;
      margin: 20px auto;
      resize: none;
      padding: 10px; 
      margin-top: 5px; 
      border: 1px solid #333; 
      border-radius: 4px; 
      box-sizing: border-box; 
      background: #2c2c2c; 
      color: #ffffff; 
      font-size: 18px
    }

    /* 按鈕文字顏色 */
    input[type="file"] { color: #888; }

    /* 按鈕顏色 */
    button { 
      display: block;
      width: 50%; 
      padding: 15px; 
      background: #2e7d32; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      margin: 20px auto 0; 
      cursor: pointer; 
      font-size: 16px; 
    }
    
    button:hover { background: #388e3c; }

    /* 訊息文字顏色改為亮綠色，在黑底更顯眼 */
    #msg { color: #81c784; text-align: center; margin-top: 10px; }
  </style>
</head>

<body>

  </div>
  <!-- 連動選單B結束 -->

  <label>事項分類</label>

    <option value="" disabled selected hidden>請選擇分類</option>
    <option>缺失</option>

      <label>插入圖片</label>

    </form>
    <div id="msg"></div>

  </div>

    <hr style="width: 400px; border: none; border-top: 1px solid gray; margin: 15px auto;">
    <div style="color: gray; font-size: 15px; line-height: 1.2; text-align: center;">
      © Reguhu 2026

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
console.log("初始化 supabase")
const supabaseUrl = 'https://clcqnbnbbtzzuctaspfn.supabase.co'
const supabaseKey = 'sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD'
  
if (!window._supabase) {
  window._supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
}
const supabase = window._supabase

// 綁定按鈕（等DOM載入完成）
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("submitBtn").addEventListener("click", submitData)
})

async function submitData() {
  const btn = document.getElementById("submitBtn")
  const msg = document.getElementById("msg")

  // 🔒 鎖按鈕
  btn.disabled = true
  btn.innerText = "送出中..."
  msg.innerText = ""

  try {
    // ✅ 表單驗證
    const 樓層 = document.querySelector('[name="樓層"]').value
    const 分類 = document.querySelector('[name="分類"]').value

    if (!樓層 || !分類) {
      throw new Error("請填寫必要欄位")
    }

    // ✅ 取得圖片
    const fileInput = document.getElementById("photoInput")
    const file = fileInput.files[0]

    let photoUrl = null

    // ✅ 上傳圖片（如果有）
    if (file) {
      const fileName = `${Date.now()}_${file.name}`

      const { data: uploadData, error: uploadError } = await supabase.storage
        .from('photos')
        .upload(fileName, file)

      if (uploadError) throw uploadError

      // 取得公開 URL
      const { data: publicUrlData } = supabase.storage
        .from('photos')
        .getPublicUrl(fileName)

      photoUrl = publicUrlData.publicUrl
    }

    // ✅ 組資料
    const data = {
      樓層,
      位置1: document.querySelector('[name="位置1"]').value,
      位置2: document.querySelector('[name="位置2"]').value,
      位置3: document.querySelector('[name="位置3"]').value,
      說明: document.querySelector('[name="說明"]').value,
      分類,
      廠商1: document.querySelector('[name="廠商1"]').value,
      廠商2: document.querySelector('[name="廠商2"]').value,
      照片: photoUrl
    }

    // ✅ 寫入資料庫
    const { error } = await supabase
      .from('records')
      .insert([data])

    if (error) throw error

    // ✅ 成功
    msg.innerText = "✅ 送出成功！"
    document.getElementById("recordForm").reset()

  } catch (err) {
    console.error(err)
    msg.innerText = "❌ " + err.message
  }

  // 🔓 解鎖按鈕
  btn.disabled = false
  btn.innerText = "確認送出"
}

/* 連動選單A開始 */

    "A2": ["客廳","餐廳","主浴","客浴","廚房","主臥室","臥室1","臥室2","臥室3","和室","露台","前陽台","後陽台","全室","管道間"],
    "A6": ["客廳","餐廳","主浴","客浴","廚房","主臥室","臥室1","臥室2","臥室3","和室","露台","前陽台","後陽台","全室","管道間"]
  },
    "戶內B": {
    "B1": ["客廳","餐廳","主浴","客浴","廚房","主臥室","臥室1","臥室2","臥室3","和室","露台","前陽台","後陽台","全室","管道間"],
    "B2": ["客廳","餐廳","主浴","客浴","廚房","主臥室","臥室1","臥室2","臥室3","和室","露台","前陽台","後陽台","全室","管道間"]
  },
    "店鋪": {
    "A1": ["樓梯","廁所"],
    "A11": ["樓梯","廁所"]    
  },
  "公設": {
    "管委會": ["大廳","兒遊室","防災中心","健身房A","健身房B","瑜伽教室A","瑜伽教室B"],
    "廁所": ["廁所"], "梯廳": ["梯廳"], "電梯廳": ["電梯廳"],
    "樓梯間": ["A1梯","A2梯","B1梯","B2梯"]
  },
  "外牆": { 
    "外牆A": ["全區","A1","A2","A3","A5","A6","A1梯","A2梯","電梯廳"],
    "外牆B": ["全區","B1","B2","B3","B5","B6","B7","B1梯","B2梯","電梯廳"]

};

const dataB = {

  "機電": ["機電","給排水","強弱電","消防","監控","燈光"],

  "開口設備": ["鋁門窗","金屬門","防火門","木門","鐵捲門","防水閘門","維修孔/檢修門","鐵件","玻璃"],
  "地工": ["尚無開項"],

};

/* 連動設置 */
window.onload = function() {
  const s1 = document.getElementById("位置1");
  const s4 = document.getElementById("廠商1");

  /* 初始化 A 第一層 */
  s1.innerHTML = '<option value="">請選擇位置</option>';
  for (let key in dataA) { s1.add(new Option(key, key)); }
  
  /* 初始化 B 第一層 */
  s4.innerHTML = '<option value="">請選擇</option>';
  for (let key in dataB) { s4.add(new Option(key, key)); }
};

/* 選單A連動(三層) */
function updateA(e) {
  const v1 = document.getElementById("位置1").value
  const v2 = document.getElementById("位置2").value
  const s2 = document.getElementById("位置2")
  const s3 = document.getElementById("位置3")

  if (e.target.id === "位置1") {
    s2.innerHTML = '<option value="">請選擇位置</option>'
    s3.innerHTML = '<option value="">請選擇空間</option>'

    if (v1 && dataA[v1]) {
      for (let key in dataA[v1]) {
        s2.add(new Option(key, key))
      }
    }
  } else if (e.target.id === "位置2") {
    s3.innerHTML = '<option value="">請選擇空間</option>'

    if (v1 && v2 && dataA[v1][v2]) {
      dataA[v1][v2].forEach(i => s3.add(new Option(i, i)))
    }
  }
}

/* 選單B連動(二層) */
function updateB() {
  const v4 = document.getElementById("廠商1").value;
  const s5 = document.getElementById("廠商2");
  s5.innerHTML = '<option value="">請選擇缺失項目</option>';
  if (v4 && dataB[v4]) {
    dataB[v4].forEach(i => s5.add(new Option(i, i)));
  }
}
  
</script>

</body>
</html>
