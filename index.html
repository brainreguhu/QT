<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整表單</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
        }
        .green-button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
    <script>
        function populateOptions() {
            // JavaScript code for cascading menus
            // Example of populating options basing on user selections
        }
        function submitForm() {
            // JavaScript code for form submission
            alert('表單已提交！');
        }
    </script>
</head>
<body>
    <h1>提交表單</h1>
    <form onsubmit="submitForm(); return false;">
        <label for="floor">樓層選單:</label>
        <select id="floor" name="floor">
            <option value="1">1樓</option>
            <option value="2">2樓</option>
            <option value="3">3樓</option>
        </select>

        <label for="location">三層級聯動選單(位置):</label>
        <select id="location" name="location" onchange="populateOptions()">
            <option value="loc1">位置1</option>
            <option value="loc2">位置2</option>
        </select>

        <label for="vendor">廠商類別:</label>
        <select id="vendor" name="vendor">
            <option value="vendor1">廠商1</option>
            <option value="vendor2">廠商2</option>
        </select>

        <label for="category">事項分類:</label>
        <select id="category" name="category">
            <option value="issue1">分類1</option>
            <option value="issue2">分類2</option>
        </select>

        <label for="image">圖片上傳:</label>
        <input type="file" id="image" name="image" accept="image/*">

        <label for="description">撰寫說明:</label>
        <textarea id="description" name="description" rows="4"></textarea>

        <button type="submit" class="green-button">提交</button>
    </form>
</body>
</html>
