<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>記錄送出</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --danger: #f87171;
      --ok: #4ade80;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 420px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 1.75rem;
      letter-spacing: 0.02em;
    }
    form {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    select,
    textarea {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input[type="file"]{
      width: 100%;
      padding: 0.5rem 0.4rem;
      border-radius: 8px;
      border: 1px dashed var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
    }
    .row-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 400px) {
      .row-pair {
        grid-template-columns: 1fr;
      }
    }
    .section-title {
      font-size: 0.75rem;
      text-transform: none;
      color: var(--muted);
      margin: 0 0 0.5rem;
      font-weight: 600;
    }
    button[type="submit"] {
      margin-top: 0.25rem;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }
    button[type="submit"]:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    #status {
      min-height: 1.25rem;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    #status.error {
      color: var(--danger);
    }
    #status.success {
      color: var(--ok);
    }
  </style>
</head>
<body>
  <main>
    <h1>新增記錄</h1>
    <form id="record-form" novalidate>
      <div>
        <p class="section-title">樓層 · 分類</p>
        <div class="row-pair">
          <div>
            <label for="floor">樓層</label>
            <select id="floor" name="floor" required>
              <option value="" disabled selected>請選擇</option>
            </select>
          </div>
          <div>
            <label for="category">分類</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>請選擇</option>
            </select>
          </div>
        </div>
      </div>
      <div>
        <label for="description">說明</label>
        <textarea id="description" name="description" placeholder="請輸入說明…" required></textarea>
      </div>
      <div>
        <label for="photo">照片</label>
        <input type="file" id="photo" name="photo" accept="image/*" required />
      </div>
      <button type="submit" id="submit-btn">送出至 Supabase</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY =
      "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";

    /** 可依實際需求修改選項 */
    const FLOOR_OPTIONS = ["1F", "2F", "3F", "B1", "B2"];
    const CATEGORY_OPTIONS = ["設備", "清潔", "維修", "巡檢", "其他"];

    /**
     * 必須與 Supabase「Table Editor」裡 records 的欄位名完全一致。
     * 若錯誤為找不到某欄位：在 SQL Editor 補欄位，或把此處值改成表上實際欄位名。
     */
    const DB_COLUMNS = {
      floor: "樓層",
      category: "分類",
      description: "說明",
      photo: "照片",
    };

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("record-form");
    const floorSelect = document.getElementById("floor");
    const categorySelect = document.getElementById("category");
    const descriptionEl = document.getElementById("description");
    const photoInput = document.getElementById("photo");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");

    function fillSelect(select, options) {
      for (const opt of options) {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        select.appendChild(o);
      }
    }

    fillSelect(floorSelect, FLOOR_OPTIONS);
    fillSelect(categorySelect, CATEGORY_OPTIONS);

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind || "";
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function pad3(n) {
      return String(n).padStart(3, "0");
    }

    function getFileExt(file) {
      // 盡量沿用原檔副檔名；若沒有就用圖片預設 .jpg
      const m = (file.name || "").match(/\.([a-zA-Z0-9]+)$/);
      return m ? `.${m[1]}` : ".jpg";
    }

    function generatePhotoObjectName(file) {
      // 依你需求：西元年 + 月 + 日 + 秒 + 毫秒
      const now = new Date();
      const year = now.getFullYear();
      const month = pad2(now.getMonth() + 1);
      const day = pad2(now.getDate());
      const seconds = pad2(now.getSeconds());
      const ms = pad3(now.getMilliseconds());
      return `${year}${month}${day}${seconds}${ms}${getFileExt(file)}`;
    }

    // 注意：Supabase Storage 的「Bucket」與 bucket 內的「資料夾路徑」是兩件事
    // 你描述的「Rublic 夾」通常是 bucket 內的資料夾，因此這裡改成常見的 public bucket
    const STORAGE_BUCKET = "Public"; // 你的 Supabase Storage bucket 名稱（大小寫需完全一致）
    const STORAGE_OBJECT_PREFIX = "Rublic"; // bucket 內資料夾（可留空表示根目錄）
    const PHOTO_DB_COLUMN = "照片"; // records 用來存照片 URL/路徑 的欄位名

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("");

      const floor = floorSelect.value.trim();
      const category = categorySelect.value.trim();
      const description = descriptionEl.value.trim();
      const photoFile = photoInput.files?.[0];

      if (!floor || !category || !description) {
        setStatus("請完成樓層、分類與說明。", "error");
        return;
      }
      if (!photoFile) {
        setStatus("請選擇照片。", "error");
        return;
      }

      submitBtn.disabled = true;
      setStatus("上傳照片中…");

      const objectName = generatePhotoObjectName(photoFile);
      const objectPath = STORAGE_OBJECT_PREFIX
        ? `${STORAGE_OBJECT_PREFIX.replace(/^\/|\/$/g, "")}/${objectName}`
        : objectName;

      const { error: uploadError } = await supabase
        .storage
        .from(STORAGE_BUCKET)
        .upload(objectPath, photoFile, {
          contentType: photoFile.type || "image/*",
          upsert: false,
        });

      submitBtn.disabled = false;

      if (uploadError) {
        setStatus(uploadError.message || "照片上傳失敗。", "error");
        console.error(uploadError);
        return;
      }

      let photoUrl = null;
      try {
        const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(objectPath);
        photoUrl = data?.publicUrl || null;
      } catch (err) {
        // 若 bucket 不是 public，仍可把 objectPath 存入 DB 由後續端取得
        console.warn(err);
      }

      const payload = {
        [DB_COLUMNS.floor]: floor,
        [DB_COLUMNS.category]: category,
        [DB_COLUMNS.description]: description,
      };

      // 只有在你把 PHOTO_DB_COLUMN 填好後才會寫入照片資訊，避免再次因欄位不存在而失敗
      if (PHOTO_DB_COLUMN) {
        payload[PHOTO_DB_COLUMN] = photoUrl || objectPath;
      }

      submitBtn.disabled = true;
      setStatus("送出中…");

      // 不使用 .select()，避免還需要額外的 select policy
      const { error: insertError } = await supabase.from("records").insert([payload]);
      submitBtn.disabled = false;

      if (insertError) {
        setStatus(insertError.message || "寫入失敗，請檢查資料表與 RLS 設定。", "error");
        console.error(insertError);
        return;
      }

      setStatus("已成功儲存。", "success");
      form.reset();
      photoInput.value = "";
    });
  </script>
</body>
</html>
