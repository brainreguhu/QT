<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QT APP</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --danger: #f87171;
      --ok: #4ade80;
      --btn-secondary-bg: #2a3038;
      --btn-secondary-hover: #383e4a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 6px;
      padding: 20px 16px 24px;
    }
    .site-footer {
      width: 100%;
      max-width: 800px;
      margin: -4px 0 0;
      padding: 0 0 2px;
      text-align: center;
      font-size: 15px;
      color: var(--muted);
    }
    .card {
      width: min(92vw, 400px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .topbar-admin {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      padding: 8px 10px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      font-family: inherit;
      white-space: nowrap;
    }
    .topbar-admin:hover {
      color: var(--text);
      border-color: var(--muted);
    }
    .user {
      font-size: 18px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .logout-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--btn-secondary-bg);
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      white-space: nowrap;
    }
    .logout-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    .logout-btn:hover {
      background: var(--btn-secondary-hover);
      border-color: var(--accent);
      color: #fff;
    }
    h1 {
      margin: 0 0 8px;
      font-size: calc(22px * 0.8);
      letter-spacing: 0.02em;
    }
    .function-zone {
      margin-top: 8px;
      padding-top: 9px;
      border-top: 1px solid rgba(45, 58, 77, 0.75);
    }
    .function-zone > h1 {
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 600;
    }
    .function-zone .links {
      gap: 10px;
    }
    .function-zone .links-row-two,
    .function-zone .links-row-three {
      gap: 8px;
    }
    .function-zone .link-btn {
      font-size: 14px;
      padding: 10px 12px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .links {
      display: grid;
      gap: 14px;
    }
    .links-row-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 420px) {
      .links-row-two {
        grid-template-columns: 1fr;
      }
    }
    .links-row-three {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .link-btn {
      display: block;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.15s ease;
    }
    .link-btn:hover {
      border-color: var(--accent);
      background: rgba(61, 139, 253, 0.12);
      color: #fff;
    }
    .tetris-btn-wrap {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 12px;
      flex-wrap: wrap;
      width: 100%;
      max-width: min(92vw, 520px);
      margin: 0 auto;
    }
    .link-btn--tetris {
      flex: 1 1 160px;
      min-width: 0;
      max-width: 400px;
      text-align: center;
      border-color: rgba(255, 170, 60, 0.45);
      background: rgba(40, 28, 12, 0.45);
      color: #fff;
      animation: tetris-outer-glow 2.8s ease-in-out infinite;
    }
    .link-btn--tetris:hover {
      border-color: rgba(255, 200, 90, 0.85);
      background: rgba(55, 38, 10, 0.55);
      color: #fff;
    }
    .link-btn--tetris-vs {
      flex: 1 1 160px;
      min-width: 0;
      max-width: 400px;
      text-align: center;
      border-color: rgba(56, 189, 248, 0.45);
      background: rgba(12, 28, 45, 0.5);
      color: #fff;
      animation: tetris-vs-outer-glow 2.8s ease-in-out infinite;
    }
    .link-btn--tetris-vs:hover {
      border-color: rgba(125, 211, 252, 0.85);
      background: rgba(15, 40, 58, 0.6);
      color: #fff;
    }
    .link-btn--field {
      border-color: rgba(244, 114, 182, 0.48);
      background: rgba(60, 18, 45, 0.5);
      color: #fff;
      animation: field-outer-glow 1.4s ease-in-out infinite;
    }
    .link-btn--field:hover {
      border-color: rgba(249, 168, 212, 0.9);
      background: rgba(78, 22, 58, 0.58);
      color: #fff;
    }
    @keyframes tetris-outer-glow {
      0%,
      100% {
        box-shadow:
          0 0 0 1px rgba(255, 160, 50, 0.35),
          0 0 14px rgba(255, 170, 50, 0.35),
          0 0 28px rgba(255, 130, 30, 0.2);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255, 200, 80, 0.55),
          0 0 22px rgba(255, 190, 70, 0.55),
          0 0 40px rgba(255, 150, 40, 0.38);
      }
    }
    @keyframes tetris-vs-outer-glow {
      0%,
      100% {
        box-shadow:
          0 0 0 1px rgba(56, 189, 248, 0.35),
          0 0 14px rgba(56, 189, 248, 0.32),
          0 0 28px rgba(34, 211, 238, 0.18);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(125, 211, 252, 0.5),
          0 0 22px rgba(56, 189, 248, 0.45),
          0 0 40px rgba(45, 212, 191, 0.28);
      }
    }
    @keyframes field-outer-glow {
      0%,
      100% {
        box-shadow:
          0 0 0 1px rgba(244, 114, 182, 0.5),
          0 0 20px rgba(244, 114, 182, 0.48),
          0 0 38px rgba(236, 72, 153, 0.34);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(251, 207, 232, 0.8),
          0 0 30px rgba(244, 114, 182, 0.72),
          0 0 54px rgba(236, 72, 153, 0.5);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .link-btn--field {
        animation: none;
        box-shadow:
          0 0 0 1px rgba(244, 114, 182, 0.42),
          0 0 16px rgba(236, 72, 153, 0.34);
      }
      .link-btn--tetris {
        animation: none;
        box-shadow:
          0 0 0 1px rgba(255, 170, 50, 0.4),
          0 0 16px rgba(255, 160, 50, 0.35);
      }
      .link-btn--tetris-vs {
        animation: none;
        box-shadow:
          0 0 0 1px rgba(56, 189, 248, 0.4),
          0 0 16px rgba(56, 189, 248, 0.3);
      }
    }
    .notice-panel {
      --notice-bg: linear-gradient(165deg, rgba(35, 55, 88, 0.65) 0%, rgba(18, 24, 38, 0.95) 100%);
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--notice-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .notice-panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .notice-textarea {
      width: 100%;
      height: 120px;
      min-height: 120px;
      max-height: 120px;
      resize: none;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.45;
    }
    .notice-textarea:read-only {
      opacity: 0.92;
      cursor: default;
    }
    .notice-textarea:focus:not(:read-only) {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    .notice-actions {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 3px;
      flex-wrap: wrap;
    }
    .notice-hint-wrap {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px 10px;
      flex: 1;
      min-width: 0;
    }
    .notice-hint {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }
    .notice-feedback {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: var(--ok);
      white-space: pre-wrap;
    }
    .notice-feedback.error {
      color: var(--danger);
    }
    .notice-save {
      align-self: flex-start;
      margin: 0;
      padding: 1px 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      background: var(--notice-bg);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      cursor: pointer;
      font-family: inherit;
    }
    .notice-save:hover:not(:disabled) {
      color: var(--text);
      filter: brightness(1.28);
      border-color: rgba(255, 255, 255, 0.28);
    }
    .notice-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="topbar">
      <div class="user" id="user-name">你好，讀取中...</div>
      <div class="topbar-actions">
        <a class="topbar-admin" href="./admin.html">人員管理</a>
        <button class="logout-btn" id="logout-btn" type="button">
          登出
          <span class="logout-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        </button>
      </div>
    </div>

    <div class="notice-panel">
      <h2>公告</h2>
      <textarea
        id="announcement-body"
        class="notice-textarea"
        readonly
        placeholder="（尚無公告內容）"
      ></textarea>
      <div class="notice-actions">
        <button type="button" class="notice-save" id="announcement-save" disabled hidden>儲存公告</button>
        <div class="notice-hint-wrap">
          <p class="notice-hint" id="announcement-hint">最高權限等級 可編輯與儲存。</p>
          <span id="announcement-feedback" class="notice-feedback" aria-live="polite"></span>
        </div>
      </div>
    </div>

    <div class="function-zone">
    <h1>請選擇功能</h1>
    <div class="links">
      <a class="link-btn link-btn--field" href="./field.html">資料管理系統🖥️</a>
      <div class="links-row-two">
        <a class="link-btn" href="./action.html">進度總覽🖥️</a>
        <a class="link-btn" href="./sumit.html">進度回報🖥️</a>
      </div>
      <div class="links-row-two">
        <a class="link-btn" href="./check.html">回報缺失📱</a>
        <a class="link-btn" href="./checklist.html">紀錄管理🖥️</a>
      </div>
      <div class="links-row-three">
        <a class="link-btn" href="">查詢考勤🚧</a>
        <a class="link-btn" href="">預訂排休🚧</a>
        <a class="link-btn" href="">填寫打卡🚧</a>
      </div>
      <a class="link-btn" href="">公司月行事曆🚧</a>
      <div class="links-row-two">
        <a class="link-btn" href="https://drive.google.com/drive/u/1/folders/101asPySuSM5x1dgdD2gw27wCO9yiZMqq">SOP圖集</a>
        <a class="link-btn" href="">網路硬碟🚧</a>
      </div>
      <div class="links-row-two">
        <a
          class="link-btn"
          href="https://www.google.com/maps/d/edit?hl=zh-TW&mid=1Xp45asKYhvmY419ltCTRt9_Q9ry2qhE&ll=25.064693094214952%2C121.41311614999996&z=12"
          target="_blank"
          rel="noopener noreferrer"
          >業績地圖</a>
        <a class="link-btn" href="">員工守則🚧</a>
      </div>
      <div class="tetris-btn-wrap">
        <a class="link-btn link-btn--tetris" href="./tetris.html">俄羅斯方塊</a>
        <a class="link-btn link-btn--tetris-vs" href="./tetris-vs.html">雙人對戰</a>
      </div>
    </div>
    </div>
  </main>
  <footer class="site-footer">© Reguhu 2026</footer>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";
    const PROFILE_TABLE = "profiles";
    const ANNOUNCEMENTS_TABLE = "announcements";
    const ANNOUNCEMENT_ROW_ID = 1;

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const userNameEl = document.getElementById("user-name");
    const logoutBtn = document.getElementById("logout-btn");
    const announcementBodyEl = document.getElementById("announcement-body");
    const announcementSaveBtn = document.getElementById("announcement-save");
    const announcementHintEl = document.getElementById("announcement-hint");
    const announcementFeedbackEl = document.getElementById("announcement-feedback");

    function setAnnouncementFeedback(msg, kind) {
      announcementFeedbackEl.textContent = msg || "";
      announcementFeedbackEl.classList.toggle("error", kind === "error");
    }

    function canEditAnnouncement(profile) {
      return Number(profile?.permission_level) === 0;
    }

    async function loadAnnouncement() {
      const { data, error } = await supabase
        .from(ANNOUNCEMENTS_TABLE)
        .select("content")
        .eq("id", ANNOUNCEMENT_ROW_ID)
        .maybeSingle();

      if (error) {
        setAnnouncementFeedback(
          `讀取公告失敗：${error.message}（請在 Supabase 執行 announcements.sql）`,
          "error"
        );
        announcementBodyEl.value = "";
        return;
      }
      announcementBodyEl.value = data?.content != null ? String(data.content) : "";
    }

    async function loadCurrentUserName() {
      const { data: authData } = await supabase.auth.getUser();
      const user = authData?.user;
      if (!user) {
        window.location.href = "./login.html";
        return;
      }

      const { data: profile, error } = await supabase
        .from(PROFILE_TABLE)
        .select("username, permission_level")
        .eq("id", user.id)
        .maybeSingle();

      if (error) {
        userNameEl.textContent = `你好，${user.email || "未知使用者"}`;
        setAnnouncementFeedback(`讀取名稱失敗：${error.message}`, "error");
        await loadAnnouncement();
        return;
      }

      const displayName = profile?.username || user.email || "未知使用者";
      userNameEl.textContent = `你好，${displayName}`;

      const editable = canEditAnnouncement(profile);
      announcementBodyEl.readOnly = !editable;
      announcementSaveBtn.hidden = !editable;
      announcementSaveBtn.disabled = !editable;
      announcementHintEl.textContent = editable
        ? "您為最高權限等級，可編輯後按「儲存公告」。"
        : "不具有儲存公告的權限。";
      setAnnouncementFeedback("");

      await loadAnnouncement();
    }

    announcementSaveBtn.addEventListener("click", async () => {
      const { data: authData } = await supabase.auth.getUser();
      const user = authData?.user;
      if (!user) return;
      const { data: profile } = await supabase
        .from(PROFILE_TABLE)
        .select("permission_level")
        .eq("id", user.id)
        .maybeSingle();
      if (!canEditAnnouncement(profile)) {
        setAnnouncementFeedback("無權限儲存公告。", "error");
        return;
      }

      announcementSaveBtn.disabled = true;
      setAnnouncementFeedback("");
      const content = announcementBodyEl.value;
      const { error } = await supabase.from(ANNOUNCEMENTS_TABLE).upsert(
        {
          id: ANNOUNCEMENT_ROW_ID,
          content,
          updated_at: new Date().toISOString(),
        },
        { onConflict: "id" }
      );
      announcementSaveBtn.disabled = false;
      if (error) {
        setAnnouncementFeedback(`儲存失敗：${error.message}`, "error");
        return;
      }
      setAnnouncementFeedback("公告已儲存。");
    });

    logoutBtn.addEventListener("click", async () => {
      if (!confirm("確定要登出嗎？")) return;
      await supabase.auth.signOut();
      window.location.href = "./login.html";
    });

    loadCurrentUserName();
  </script>
</body>
</html>
