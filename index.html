<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上缺失紀錄 1.2</title>
    <style>
        body { font-family: Arial, sans-serif; }
        form { margin: 20px; }
        label { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>線上缺失紀錄 1.2</h1>
    <form id="dataForm">
        <label for="dataA">選擇A:</label>
        <select id="dataA" name="dataA" onchange="updateA()"> 
            <option value="">--請選擇--</option>
            <option value="A1">選項A1</option>
            <option value="A2">選項A2</option>
            <option value="A3">選項A3</option>
        </select>

        <label for="dataB">選擇B:</label>
        <select id="dataB" name="dataB" onchange="updateB()">
            <option value="">--請選擇--</option>
            <option value="B1">選項B1</option>
            <option value="B2">選項B2</option>
            <option value="B3">選項B3</option>
        </select>

        <button type="button" id="submitButton" onclick="submitData()">提交</button>
    </form>

    <script>
        var dataA = { A1: "詳細信息A1", A2: "詳細信息A2", A3: "詳細信息A3" };
        var dataB = { B1: "詳細信息B1", B2: "詳細信息B2", B3: "詳細信息B3" };

        function updateA() {
            const selectA = document.getElementById('dataA');
            const selectedA = selectA.value;
            console.log('選擇的A選項:', dataA[selectedA]);
            // Additional functionality can be added here
        }

        function updateB() {
            const selectB = document.getElementById('dataB');
            const selectedB = selectB.value;
            console.log('選擇的B選項:', dataB[selectedB]);
            // Additional functionality can be added here
        }

        function submitData() {
            const selectedA = document.getElementById('dataA').value;
            const selectedB = document.getElementById('dataB').value;
            if (selectedA && selectedB) {
                google.script.run.withSuccessHandler(function(response) {
                    alert('提交成功: ' + response);
                }).handleFormSubmit(selectedA, selectedB);
            } else {
                alert('請選擇A和B選項。');
            }
        }
    </script>
</body>
</html>
