// 初始化 Supabase 客戶端
const _supabase = supabase.createClient('https://supabase.co', '你的anon-key');

async function submitData(btn) {
  try {
    btn.disabled = true;
    btn.innerText = "上傳中...";
    
    const form = document.getElementById("recordForm");
    const formData = new FormData(form);

    // --- 第一步：處理圖片上傳 ---
    let photoUrl = "";
    // 假設你的檔案欄位 name 是 "photoFile" 或 "myFile"
    const fileInput = document.getElementsByName("photoFile")[0] || document.getElementsByName("myFile")[0];
    const file = fileInput.files[0];

    if (file) {
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      const filePath = `uploads/${fileName}`;

      // 上傳至名為 "photos" 的 Bucket (請先在 Supabase 建立此 Bucket)
      const { data: uploadData, error: uploadError } = await _supabase.storage
        .from('photos')
        .upload(filePath, file);

      if (uploadError) throw new Error("圖片上傳失敗: " + uploadError.message);

      // 取得公開網址
      const { data: publicUrlData } = _supabase.storage
        .from('photos')
        .getPublicUrl(filePath);
      photoUrl = publicUrlData.publicUrl;
    }

    // --- 第二步：寫入資料庫 ---
    // 欄位名稱請對照你 Supabase 資料表設定的英文名稱
    const { error: dbError } = await _supabase
      .from('你的資料表名稱') 
      .insert([{
        "來自": "📱",
        "樓層": formData.get("floor"),
        "位置1": formData.get("lvl1"),
        "位置2": formData.get("lvl2"),
        "位置3": formData.get("lvl3"),
        "缺失": formData.get("desc"),
        "分類": formData.get("classification"),
        "廠商1": formData.get("category1"),
        "廠商2": formData.get("category2"),
        "照片": photoUrl,
        "提交時間": new Date().toISOString()
      }]);

    if (dbError) throw new Error("資料庫寫入失敗: " + dbError.message);

    // --- 第三步：成功後的處理邏輯 ---
    var msgDiv = document.getElementById("msg");
    msgDiv.innerText = "✅ 資料已成功儲存至 Supabase！"; 
    setTimeout(function() { msgDiv.innerText = ""; }, 5000); 

    /* 清除欄位 */
    form.reset(); // 使用 reset() 一次清除所有輸入
    
    var s5 = document.getElementById("lvl5");
    if(s5) s5.innerHTML = '<option value="" disabled selected>請先選類別</option>';        

    /* 恢復按鈕狀態 */
    btn.disabled = false;
    btn.innerText = "確認送出";

  } catch (e) {
    console.error(e);
    alert("執行失敗：" + e.message);
    btn.disabled = false;
    btn.innerText = "確認送出";
  }
}

window.onload = function() {

/* 選單A連動(三層) */
function updateA() {
  const v1 = document.getElementById("lvl1").value;
  const v2 = document.getElementById("lvl2").value;
  const s2 = document.getElementById("lvl2");
  const s3 = document.getElementById("lvl3");

  /* 選單A處理第二層 */
  if (event.target.id === "lvl1") {
    s2.innerHTML = '<option value="">請選擇位置</option>';
    s3.innerHTML = '<option value="">請選擇空間</option>';
    if (v1 && dataA[v1]) {
      for (let key in dataA[v1]) { s2.add(new Option(key, key)); }
    }
  } 
  /* 選單A處理第三層 */
  else if (event.target.id === "lvl2") {
    s3.innerHTML = '<option value="">請選擇空間</option>';
    if (v1 && v2 && dataA[v1][v2]) {
      dataA[v1][v2].forEach(i => s3.add(new Option(i, i)));
    }
  }
}

/* 選單B連動(二層) */
function updateB() {
  const v4 = document.getElementById("lvl4").value;

  s5.innerHTML = '<option value="">請選擇缺失項目</option>';

/* 將檔案傳送給 Google Apps Script */
function uploadImage() {
  const file = document.getElementById('photoInput').files[0];
  const reader = new FileReader();
  
  reader.onload = function(e) {
  /* 直接把原始結果丟給後端，不用在前端寫 split 邏輯 */
    google.script.run
      .withSuccessHandler(msg => alert(msg))
      .processUpload({
        base64: e.target.result, 
        type: file.type
      });
  };
  reader.readAsDataURL(file);
}
