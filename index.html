<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>記錄送出</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --danger: #f87171;
      --ok: #4ade80;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 420px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 1.75rem;
      letter-spacing: 0.02em;
    }
    form {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    select,
    textarea {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .row-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 400px) {
      .row-pair {
        grid-template-columns: 1fr;
      }
    }
    .section-title {
      font-size: 0.75rem;
      text-transform: none;
      color: var(--muted);
      margin: 0 0 0.5rem;
      font-weight: 600;
    }
    button[type="submit"] {
      margin-top: 0.25rem;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }
    button[type="submit"]:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    #status {
      min-height: 1.25rem;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    #status.error {
      color: var(--danger);
    }
    #status.success {
      color: var(--ok);
    }
  </style>
</head>
<body>
  <main>
    <h1>新增記錄</h1>
    <form id="record-form" novalidate>
      <div>
        <p class="section-title">樓層 · 分類</p>
        <div class="row-pair">
          <div>
            <label for="floor">樓層</label>
            <select id="floor" name="floor" required>
              <option value="" disabled selected>請選擇</option>
            </select>
          </div>
          <div>
            <label for="category">分類</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>請選擇</option>
            </select>
          </div>
        </div>
      </div>
      <div>
        <label for="description">說明</label>
        <textarea id="description" name="description" placeholder="請輸入說明…" required></textarea>
      </div>
      <button type="submit" id="submit-btn">送出至 Supabase</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY =
      "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";

    /** 可依實際需求修改選項 */
    const FLOOR_OPTIONS = ["1F", "2F", "3F", "B1", "B2"];
    const CATEGORY_OPTIONS = ["設備", "清潔", "維修", "巡檢", "其他"];

    /**
     * 必須與 Supabase「Table Editor」裡 records 的欄位名完全一致。
     * 若錯誤為找不到某欄位：在 SQL Editor 補欄位，或把此處值改成表上實際欄位名。
     */
    const DB_COLUMNS = {
      floor: "樓層",
      category: "分類",
      description: "說明",
    };

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("record-form");
    const floorSelect = document.getElementById("floor");
    const categorySelect = document.getElementById("category");
    const descriptionEl = document.getElementById("description");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");

    function fillSelect(select, options) {
      for (const opt of options) {
        const o = document.createElement("option");
        o.value = opt;
        o.textContent = opt;
        select.appendChild(o);
      }
    }

    fillSelect(floorSelect, FLOOR_OPTIONS);
    fillSelect(categorySelect, CATEGORY_OPTIONS);

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind || "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("");

      const floor = floorSelect.value.trim();
      const category = categorySelect.value.trim();
      const description = descriptionEl.value.trim();

      if (!floor || !category || !description) {
        setStatus("請完成樓層、分類與說明。", "error");
        return;
      }

      const payload = {
        [DB_COLUMNS.floor]: floor,
        [DB_COLUMNS.category]: category,
        [DB_COLUMNS.description]: description,
      };

      submitBtn.disabled = true;
      setStatus("送出中…");

      const { data, error } = await supabase.from("records").insert([payload]).select();

      submitBtn.disabled = false;

      if (error) {
        setStatus(error.message || "寫入失敗，請檢查資料表與 RLS 設定。", "error");
        console.error(error);
        return;
      }

      setStatus("已成功儲存。", "success");
      form.reset();
    });
  </script>
</body>
</html>
