<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理後台</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --danger: #f87171;
      --ok: #4ade80;
      --btn-secondary-bg: #2a3038;
      --btn-secondary-hover: #383e4a;
      --admin-table-min: 920px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
    }
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 18px;
    }
    .card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 10px;
      padding-right: 6.5rem;
      font-size: 24px;
    }
    .hint {
      margin: 0 0 0px;
      color: var(--muted);
      font-size: 14px;
    }
    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      min-height: 16px;
      font-size: 14px;
      margin: 4px 0 10px;
    }
    #status.error { color: var(--danger); }
    #status.success { color: var(--ok); }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: var(--admin-table-min);
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
      font-size: 13px;
      vertical-align: middle;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    th:nth-child(1), td:nth-child(1) {
      width: 16%;
      word-break: break-all;
    }
    th:nth-child(2), td:nth-child(2) { width: 12%; }
    th:nth-child(3), td:nth-child(3) { width: 8%; }
    th:nth-child(4), td:nth-child(4) { width: 8%; }
    th:nth-child(5), td:nth-child(5) { width: 10%; }
    th:nth-child(6), td:nth-child(6) {
      width: 14%;
      font-size: 12px;
      line-height: 1.35;
    }
    th:nth-child(7), td:nth-child(7) { width: 32%; }
    th {
      color: var(--muted);
      font-weight: 600;
      background: rgba(255, 255, 255, 0.02);
    }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 6px;
      font-size: 11px;
      border: 1px solid var(--border);
    }
    .badge.ok {
      color: var(--ok);
      border-color: rgba(74, 222, 128, 0.4);
      background: rgba(74, 222, 128, 0.08);
    }
    .badge.no {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.4);
      background: rgba(248, 113, 113, 0.08);
    }
    select.level {
      width: 60px;
      max-width: 100%;
      padding: 4px 5px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    input.work-zone {
      width: 72px;
      max-width: 100%;
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row-actions button {
      padding: 4px 4px;
      font-size: 12px;
    }
    .row-actions button[data-approve],
    .row-actions button[data-save-role],
    .row-actions button[data-save-work-zone] {
      transform-origin: center center;
      background-color: transparent;
      transition:
        transform 0.18s ease,
        filter 0.18s ease,
        box-shadow 0.18s ease,
        background-color 0.18s ease,
        border-color 0.18s ease;
    }
    .row-actions button[data-approve]:hover:not(:disabled),
    .row-actions button[data-save-role]:hover:not(:disabled),
    .row-actions button[data-save-work-zone]:hover:not(:disabled) {
      transform: scale(1.1);
      filter: brightness(1.18);
      background-color: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.35);
    }
    .row-actions button[data-approve]:active:not(:disabled),
    .row-actions button[data-save-role]:active:not(:disabled),
    .row-actions button[data-save-work-zone]:active:not(:disabled) {
      transform: scale(1.05);
      filter: brightness(0.92);
      background-color: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
    }
    .tiny { font-size: 12px; color: var(--muted); margin: 5px 0px -5px 0px ;}
    .card .back-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      background: var(--btn-secondary-bg);
      font-family: inherit;
      cursor: pointer;
    }
    .card .back-btn:hover {
      background: var(--btn-secondary-hover);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <a class="back-btn" href="./index.html">↩ 返回</a>
      <h1>使用者管理後台</h1>
      <p class="hint">可批准註冊、設定權限等級（0:開發人員, 1:主管, 2:員工, 3:訪客）。</p>
      <p class="hint">僅管理員可操作。(請向右滑動表格)</p>
      <p id="status" role="status" aria-live="polite"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>帳號</th>
              <th>使用者</th>
              <th>批准</th>
              <th>權限</th>
              <th>工區</th>
              <th>建立時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <p class="tiny">注意：此頁可用前提是 Supabase RLS 已允許管理員更新 "profiles" 表單。</p>
      <p class="tiny">資料修正(刪除)需於 Supabase 資料庫執行，請洽詢管理員。</p>
      <p class="tiny">密碼保存於 Supabase 加密資料庫，管理員無法查看，遺失密碼請重新註冊。</p>
    </div>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://clcqnbnbbtzzuctaspfn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_1PJYZvRhU8qgCnwit6EG7Q_xjKq49oD";
    const PROFILE_TABLE = "profiles";
    const ADMIN_LEVEL_MAX = 0; // 0 = 最高權限（可操作後台）

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");

    let currentAdmin = null;

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind || "";
    }

    function fmt(ts) {
      if (!ts) return "-";
      const d = new Date(ts);
      return Number.isNaN(d.getTime()) ? "-" : d.toLocaleString();
    }

    function levelOptions(current) {
      return [0, 1, 2, 3]
        .map((lv) => `<option value="${lv}" ${Number(current) === lv ? "selected" : ""}>${lv}</option>`)
        .join("");
    }

    function escapeAttr(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function requireAdmin() {
      const { data: authData } = await supabase.auth.getUser();
      const user = authData?.user;
      if (!user) {
        setStatus("尚未登入，請先到 login.html 登入。", "error");
        return false;
      }

      const { data: me, error } = await supabase
        .from(PROFILE_TABLE)
        .select("id, username, approved, permission_level")
        .eq("id", user.id)
        .maybeSingle();

      if (error || !me) {
        setStatus("無法讀取你的管理者資訊。", "error");
        return false;
      }

      if (!me.approved || Number(me.permission_level) > ADMIN_LEVEL_MAX) {
        setStatus("權限不足：目前權限等級拒絕訪問資料及操作。", "error");
        return false;
      }

      currentAdmin = me;
      return true;
    }

    async function updateProfile(id, patch) {
      const { error } = await supabase
        .from(PROFILE_TABLE)
        .update({
          ...patch,
          approved_by: currentAdmin.id,
          approved_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        })
        .eq("id", id);
      if (error) throw error;
    }

    /** 僅更新指定欄位（不寫入 approved_by／approved_at，避免工區等欄位變更被 RLS/審計欄位擋下） */
    async function patchProfile(id, patch) {
      const { error } = await supabase
        .from(PROFILE_TABLE)
        .update({
          ...patch,
          updated_at: new Date().toISOString(),
        })
        .eq("id", id);
      if (error) throw error;
    }
    function renderRows(list) {
      if (!list.length) {
        rowsEl.innerHTML = `<tr><td colspan="7">目前無資料</td></tr>`;
        return;
      }

      rowsEl.innerHTML = list.map((row) => `
        <tr data-id="${row.id}">
          <td>${row.account || "-"}</td>
          <td>${row.username || "-"}</td>
          <td>${row.approved ? `<span class="badge ok">已批准</span>` : `<span class="badge no">待批准</span>`}</td>
          <td>
            <select class="level" data-role-select>
              ${levelOptions(row.permission_level)}
            </select>
          </td>
          <td>
            <input class="work-zone" data-work-zone-input type="text" value="${escapeAttr(String(row.工區 ?? ""))}" placeholder="例如 69" />
          </td>
          <td>${fmt(row.created_at)}</td>
          <td>
            <div class="row-actions">
              <button type="button" data-approve>${row.approved ? "取消批准" : "批准"}</button>
              <button type="button" data-save-role>儲存權限</button>
              <button type="button" data-save-work-zone>儲存工區</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function fetchAllProfiles() {
      const pageSize = 1000;
      let from = 0;
      const all = [];

      while (true) {
        const to = from + pageSize - 1;
        const { data, error } = await supabase
          .from(PROFILE_TABLE)
          .select("id, account, username, approved, permission_level, created_at, 工區")
          .order("created_at", { ascending: false })
          .range(from, to);

        if (error) throw error;

        const chunk = data || [];
        all.push(...chunk);
        if (chunk.length < pageSize) break;
        from += pageSize;
      }

      return all;
    }

    async function loadProfiles() {
      setStatus("讀取中...");
      try {
        const data = await fetchAllProfiles();
        const list = data || [];
        renderRows(list);
        setStatus(`已載入 ${list.length} 筆`, "success");
      } catch (error) {
        setStatus(`讀取失敗：${error.message}`, "error");
        return;
      }
    }

    async function saveWorkZoneForRow(tr) {
      const id = tr.getAttribute("data-id");
      if (!id) return;
      const username = String(tr.children[1]?.textContent || "").trim();
      const zoneInput = tr.querySelector("[data-work-zone-input]");
      const workZone = String(zoneInput?.value || "").trim();
      if (!username || username === "-") {
        setStatus("缺少使用者名稱，無法更新工區。", "error");
        return;
      }
      if (!workZone) {
        setStatus("請先輸入工區。", "error");
        return;
      }
      await patchProfile(id, { 工區: workZone });
      await loadProfiles();
      setStatus(`已將 ${username} 的 profiles 工區更新為 ${workZone}。`, "success");
    }

    rowsEl.addEventListener("click", async (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      const tr = target.closest("tr[data-id]");
      if (!tr) return;
      const id = tr.getAttribute("data-id");
      if (!id) return;

      try {
        if (target.closest("[data-approve]")) {
          const approveBtn = target.closest("[data-approve]");
          const approved = approveBtn?.textContent?.trim() === "批准";
          await updateProfile(id, { approved });
          await loadProfiles();
          return;
        }

        if (target.closest("[data-save-role]")) {
          const select = tr.querySelector("[data-role-select]");
          const level = Number(select?.value ?? 3);
          if (Number.isNaN(level) || level < 0 || level > 3) {
            setStatus("權限等級需介於 0~3。", "error");
            return;
          }
          await updateProfile(id, { permission_level: level });
          await loadProfiles();
          return;
        }

        if (target.closest("[data-save-work-zone]")) {
          await saveWorkZoneForRow(tr);
        }
      } catch (err) {
        setStatus(`更新失敗：${err.message}`, "error");
      }
    });

    rowsEl.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const el = e.target;
      if (!(el instanceof HTMLInputElement)) return;
      if (!el.hasAttribute("data-work-zone-input")) return;
      e.preventDefault();
      const tr = el.closest("tr[data-id]");
      if (!tr) return;
      saveWorkZoneForRow(tr).catch((err) => {
        setStatus(`更新失敗：${err.message}`, "error");
      });
    });

    (async () => {
      const ok = await requireAdmin();
      if (!ok) return;
      await loadProfiles();
    })();
  </script>
</body>
</html>
